constellation:
  id: luna-nrho-relay-1
  display_name: Single-node lunar NRHO relay (Gateway-class)
  node: nodalarc:nodes/space/luna-relay.yaml
  orbit: nodalarc:orbits/luna/nrho/luna-nrho-southern-l2.yaml
  planes:
    count: 1
    raan_spacing_deg: 0
  slots_per_plane: 1
  phasing:
    mode: evenly_spaced_mean_anomaly
    phase_offset_deg: 0
  node_tags:
  - tag: all
  reference: https://www.nasa.gov/mission/gateway/
  notes: Gateway-class relay in the southern L2 NRHO. Future-gated content -
    the crtbp propagator is not implemented yet, so sessions referencing this
    constellation fail resolution with a typed UnsupportedFeature rather than
    flying a physically false Kepler approximation.
