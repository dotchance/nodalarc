session:
  name: earth-leo-polar
  display_name: Earth polar LEO
  description: Polar LEO shell for high-latitude and polar-seam experiments.
segments:
- id: leo
  source: nodalarc:constellations/earth/leo/earth-leo-polar-36.yaml
- id: ground
  placement:
    from_site_set: nodalarc:site-sets/earth/leo/earth-leo-polar-gateway-sites.yaml
  apply:
    scheduling:
      selection_policy:
        highest_elevation: {}
      handover_policy:
        hysteresis:
          discount_factor: 1.1
          mask_fade_range_deg: 3.0
      handover_mode: mbb
      mbb_overlap_ticks: 30
      mbb_reserve: 1
      handover_concurrency: one_at_a_time
      ranking_order:
      - service_priority
      - selection_score
      - satellite_ground_terminal_capacity
      - lex_pair
      mbb_preemption: 'off'
      successor_abort_policy: hard_release
      cross_tenant_displacement: 'off'
      bbm_acquire_timeout_ticks: 1
  overrides:
  # Bridging needs gateways holding several STEADY links into different
  # chains: MBB's reserve holds a terminal back for handover, so every
  # bridge site runs break-before-make and uses its full terminal
  # capacity. Frankfurt keeps MBB as the session's make-before-break
  # demonstration endpoint.
  # Overrides replace the apply block wholesale, so the allocator-wide
  # fields are restated identically (the resolver rejects non-uniform).
  - match: {site: earth-sj-svalbard}
    scheduling:
      selection_policy:
        highest_elevation: {}
      handover_policy:
        hysteresis:
          discount_factor: 1.1
          mask_fade_range_deg: 3.0
      handover_mode: bbm
      handover_concurrency: one_at_a_time
      ranking_order:
      - service_priority
      - selection_score
      - satellite_ground_terminal_capacity
      - lex_pair
      mbb_preemption: 'off'
      successor_abort_policy: hard_release
      cross_tenant_displacement: 'off'
      bbm_acquire_timeout_ticks: 1
  - match: {site: earth-dj-djibouti}
    scheduling:
      selection_policy:
        highest_elevation: {}
      handover_policy:
        hysteresis:
          discount_factor: 1.1
          mask_fade_range_deg: 3.0
      handover_mode: bbm
      handover_concurrency: one_at_a_time
      ranking_order:
      - service_priority
      - selection_score
      - satellite_ground_terminal_capacity
      - lex_pair
      mbb_preemption: 'off'
      successor_abort_policy: hard_release
      cross_tenant_displacement: 'off'
      bbm_acquire_timeout_ticks: 1
  - match: {site: earth-sg-singapore}
    scheduling:
      selection_policy:
        highest_elevation: {}
      handover_policy:
        hysteresis:
          discount_factor: 1.1
          mask_fade_range_deg: 3.0
      handover_mode: bbm
      handover_concurrency: one_at_a_time
      ranking_order:
      - service_priority
      - selection_score
      - satellite_ground_terminal_capacity
      - lex_pair
      mbb_preemption: 'off'
      successor_abort_policy: hard_release
      cross_tenant_displacement: 'off'
      bbm_acquire_timeout_ticks: 1
  - match: {site: earth-za-cape-town}
    scheduling:
      selection_policy:
        highest_elevation: {}
      handover_policy:
        hysteresis:
          discount_factor: 1.1
          mask_fade_range_deg: 3.0
      handover_mode: bbm
      handover_concurrency: one_at_a_time
      ranking_order:
      - service_priority
      - selection_score
      - satellite_ground_terminal_capacity
      - lex_pair
      mbb_preemption: 'off'
      successor_abort_policy: hard_release
      cross_tenant_displacement: 'off'
