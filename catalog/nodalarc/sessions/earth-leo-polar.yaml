  - match: {site: earth-jp-tokyo}
    scheduling:
      selection_policy:
        highest_elevation: {}
      handover_policy:
        hysteresis:
          discount_factor: 1.1
          mask_fade_range_deg: 3.0
      handover_mode: bbm
      handover_concurrency: one_at_a_time
      ranking_order:
      - service_priority
      - selection_score
      - satellite_ground_terminal_capacity
      - lex_pair
      mbb_preemption: 'off'
      successor_abort_policy: hard_release
      cross_tenant_displacement: 'off'
      bbm_acquire_timeout_ticks: 1
  - match: {site: earth-us-co-denver}
    scheduling:
      selection_policy:
        highest_elevation: {}
