link_rules:
- id: leo_access
  topology:
    mode: visible_candidates
  endpoints:
  - select:
      all:
      - segment: ground
      - tag: leo
    terminal:
      all:
      - role: access
      - medium: rf
    # Gateway feeder mask: Iridium-class gateways track to low elevation
    # (~8-10 deg). At 25 deg this 36-sat shell connects some inter-site
    # pair only ~52% of the time (simulated); at 10 deg, ~87%.
    min_elevation_deg: 10
  - select:
      segment: leo
    terminal:
      all:
      - role: access
      - medium: rf
- id: leo_isl
  topology:
    mode: explicit_pairs
    pairs:
    - {a: sat-p00s00, b: sat-p01s00}
    - {a: sat-p00s01, b: sat-p01s01}
    - {a: sat-p00s02, b: sat-p01s02}
    - {a: sat-p00s03, b: sat-p01s03}
    - {a: sat-p00s04, b: sat-p01s04}
    - {a: sat-p00s05, b: sat-p01s05}
    - {a: sat-p01s00, b: sat-p02s00}
    - {a: sat-p01s01, b: sat-p02s01}
    - {a: sat-p01s02, b: sat-p02s02}
    - {a: sat-p01s03, b: sat-p02s03}
    - {a: sat-p01s04, b: sat-p02s04}
    - {a: sat-p01s05, b: sat-p02s05}
    - {a: sat-p02s00, b: sat-p03s00}
    - {a: sat-p02s01, b: sat-p03s01}
    - {a: sat-p02s02, b: sat-p03s02}
    - {a: sat-p02s03, b: sat-p03s03}
    - {a: sat-p02s04, b: sat-p03s04}
    - {a: sat-p02s05, b: sat-p03s05}
    - {a: sat-p03s00, b: sat-p04s00}
    - {a: sat-p03s01, b: sat-p04s01}
    - {a: sat-p03s02, b: sat-p04s02}
    - {a: sat-p03s03, b: sat-p04s03}
    - {a: sat-p03s04, b: sat-p04s04}
    - {a: sat-p03s05, b: sat-p04s05}
    - {a: sat-p04s00, b: sat-p05s00}
    - {a: sat-p04s01, b: sat-p05s01}
    - {a: sat-p04s02, b: sat-p05s02}
    - {a: sat-p04s03, b: sat-p05s03}
    - {a: sat-p04s04, b: sat-p05s04}
    - {a: sat-p04s05, b: sat-p05s05}
  endpoints:
  - select:
      segment: leo
    terminal:
      all:
      - role: isl
      - medium: optical
  - select:
      segment: leo
    terminal:
      all:
      - role: isl
      - medium: optical
simulation:
  candidate_limits:
    max_pairs_per_rule: 500
    max_pairs_per_tick: 2000
time:
  start_time: '2026-06-08T00:00:00Z'
  step_seconds: 1
  compression: 1
