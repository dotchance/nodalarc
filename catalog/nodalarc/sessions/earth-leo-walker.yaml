session:
  name: earth-leo-walker
  display_name: Earth LEO Walker-delta
  description: Scaled 176-satellite Walker-delta LEO shell with Starlink-style gateway access.
segments:
- id: leo
  source: nodalarc:constellations/earth/leo/earth-leo-walker-delta-176.yaml
- id: ground
  placement:
    from_site_set: nodalarc:site-sets/earth/leo/earth-leo-starlink-pop-sites.yaml
  apply:
    scheduling:
      selection_policy:
        highest_elevation: {}
      handover_policy:
        hysteresis:
          discount_factor: 1.1
          mask_fade_range_deg: 3.0
      handover_mode: mbb
      mbb_overlap_ticks: 3
      mbb_reserve: 1
      handover_concurrency: one_at_a_time
      ranking_order:
      - service_priority
      - selection_score
      - satellite_ground_terminal_capacity
      - lex_pair
      mbb_preemption: 'off'
      successor_abort_policy: hard_release
      cross_tenant_displacement: 'off'
      bbm_acquire_timeout_ticks: 1
link_rules:
- id: leo_access
  topology:
    mode: visible_candidates
  endpoints:
  - select:
      all:
      - segment: ground
      - tag: leo
    terminal:
      all:
      - role: access
      - medium: rf
    min_elevation_deg: 25
  - select:
      segment: leo
    terminal:
      all:
      - role: access
      - medium: rf
- id: leo_isl
  topology:
    mode: nearest_n
    n: 2
  endpoints:
  - select:
      segment: leo
    terminal:
      all:
      - role: isl
      - medium: optical
  - select:
      segment: leo
    terminal:
      all:
      - role: isl
      - medium: optical
simulation:
  candidate_limits:
    max_pairs_per_rule: 1000
    max_pairs_per_tick: 2000
time:
  start_time: '2026-06-08T00:00:00Z'
  step_seconds: 10
  compression: 1
