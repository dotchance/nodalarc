site_set:
  id: earth-leo-oneweb-gateway-sites
  display_name: LEO B gateway sites
  sites:
  - nodalarc:sites/earth/dj/earth-dj-djibouti.yaml
  - nodalarc:sites/earth/sg/earth-sg-singapore.yaml
  - nodalarc:sites/earth/za/earth-za-cape-town.yaml
  - nodalarc:sites/earth/jp/earth-jp-tokyo.yaml
  notes: Four LEO B gateway sites, disjoint from the LEO A set — one ground
    terminal serves one constellation, so the two LEO shells use separate
    gateway terminals (a shared physical site would install a second,
    shell-specific terminal and node rather than time-share a dish pool).
