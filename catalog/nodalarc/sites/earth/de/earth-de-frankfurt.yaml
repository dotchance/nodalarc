site:
  id: earth-de-frankfurt
  display_name: Frankfurt polar LEO gateway
  verified:
    source: legacy_catalog
    notes: Polar LEO demo gateway using the researched Frankfurt location and a LEO access terminal sized for the 780 km shell.
  lan:
    ipv4: 172.16.21.0/24
    ipv6: fd00:da7a:15::/64
  nodes:
  - id: gw1
    display_name: LEO Gateway
    model: nodalarc:nodes/ground/leo-gateway.yaml
    terminals:
      access_ka:
        installed_count: 2
        capabilities:
          bandwidth_mbps:
            transmit: 1000.0
            receive: 1000.0
          tracking_capacity: 1
          max_range_km: 2500.0
          limits:
            azimuth_deg:
              min: -180
              max: 180
            elevation_deg:
              min: 25.0
              max: 90
            max_tracking_rate_deg_s: 1.5
          boresight:
            mode: local_vertical
    payloads: {}
    interfaces:
      lo0:
        ipv4: 10.255.0.24/32
        ipv6: fd00:da7a:ffff::18/128
      terr0:
        ipv4: 172.16.21.1/24
        ipv6: fd00:da7a:15::1/64
    originated_prefixes:
      ipv4:
      - 172.16.21.0/24
      - 0.0.0.0/0
      ipv6:
      - fd00:da7a:15::/64
    tags:
    - leo
  frame:
    body_fixed:
      body: nodalarc:bodies/earth.yaml
  location:
    lat_deg: 50.11
    lon_deg: 8.68
    alt_m: 110
