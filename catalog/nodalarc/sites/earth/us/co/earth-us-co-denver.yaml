site:
  id: earth-us-co-denver
  display_name: Denver gateway (LEO + MEO)
  verified:
    source: nodalarc_catalog
    notes: NodalArc demo site using a named-facility coordinate estimate and explicit emulation addressing.
  lan:
    ipv4: 172.16.99.0/24
    ipv6: fd00:da7a:63::/64
  nodes:
  - id: leo-gateway
    model: nodalarc:nodes/ground/leo-gateway.yaml
    payloads: {}
    terminals:
      access_ka:
        installed_count: 4
        capabilities:
          bandwidth_mbps:
            transmit: 1000.0
            receive: 1000.0
          tracking_capacity: 1
          max_range_km: 2500.0
          limits:
            azimuth_deg:
              min: -180
              max: 180
            elevation_deg:
              min: 25
              max: 90
            max_tracking_rate_deg_s: 2.5
          boresight:
            mode: local_vertical
    originated_prefixes:
      ipv4: &id001
      - 172.16.99.0/24
      - 0.0.0.0/0
      ipv6:
      - fd00:da7a:63::/64
    tags:
    - leo
    interfaces:
      lo0:
        ipv4: 10.255.0.104/32
        ipv6: fd00:da7a:ffff::68/128
      terr0:
        ipv4: 172.16.99.1/24
        ipv6: fd00:da7a:63::1/64
  - id: meo-gateway
    model: nodalarc:nodes/ground/meo-gateway.yaml
    payloads: {}
    terminals:
      access_ka:
        installed_count: 2
        capabilities:
          bandwidth_mbps:
            transmit: 500.0
            receive: 500.0
          tracking_capacity: 1
          max_range_km: 28000.0
          limits:
            azimuth_deg:
              min: -180
              max: 180
            elevation_deg:
              min: 10
              max: 90
            max_tracking_rate_deg_s: 0.5
          boresight:
            mode: local_vertical
    tags:
    - meo
    interfaces:
      lo0:
        ipv4: 10.255.0.105/32
        ipv6: fd00:da7a:ffff::69/128
      terr0:
        ipv4: 172.16.99.2/24
        ipv6: fd00:da7a:63::2/64
    originated_prefixes:
      ipv4: *id001
      ipv6:
      - fd00:da7a:63::/64
  frame:
    body_fixed:
      body: nodalarc:bodies/earth.yaml
  location:
    lat_deg: 39.7392
    lon_deg: -104.9903
    alt_m: 1609
