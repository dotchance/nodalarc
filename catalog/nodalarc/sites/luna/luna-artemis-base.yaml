        ipv4: 10.255.0.158/32
        ipv6: fd00:da7a:ffff::9e/128
      terr0:
        ipv4: 172.16.152.1/24
        ipv6: fd00:da7a:98::1/64
    tags:
    - luna
    originated_prefixes:
      ipv4:
      - 172.16.152.0/24
      ipv6:
      - fd00:da7a:98::/64
  frame:
    body_fixed:
      body: nodalarc:bodies/luna.yaml
