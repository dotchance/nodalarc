    notes: Lunar south-pole surface site for cislunar reachability experiments.
  lan:
    ipv4: 172.16.152.0/24
    ipv6: fd00:da7a:98::/64
  nodes:
  - id: luna-gateway
    model: nodalarc:nodes/ground/luna-surface-gateway.yaml
    payloads: {}
    terminals:
