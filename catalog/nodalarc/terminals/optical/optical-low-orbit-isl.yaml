terminal:
  id: optical-low-orbit-isl
  display_name: Generic low-orbit optical ISL terminal
  medium: optical
  signal:
    wavelength_nm: 1550
  bandwidth_mbps:
    transmit: 2000
    receive: 2000
  tracking_capacity: 1
  max_range_km: 6000
  limits:
    azimuth_deg:
      min: -170
      max: 170
    elevation_deg:
      min: -55
      max: 85
    max_tracking_rate_deg_s: 2.0
  reference: https://en.wikipedia.org/wiki/Laser_communication_in_space
  notes: Generic engineering model for a LEO / low-lunar-orbit optical inter-satellite link, with representative round values. Not a specific vendor product; for a datasheet-backed model use optical-mynaric-condor-mk3-space-isl.
