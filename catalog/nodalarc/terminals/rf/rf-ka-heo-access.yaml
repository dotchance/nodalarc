terminal:
  id: rf-ka-heo-access
  display_name: Ka-band HEO access terminal
  medium: rf
  signal:
    band: ka
    frequency_hz: 27500000000
  bandwidth_mbps:
    transmit: 500
    receive: 500
  tracking_capacity: 1
  max_range_km: 50000
  limits:
    azimuth_deg:
      min: -180
      max: 180
    elevation_deg:
      min: -80
      max: 90
    max_tracking_rate_deg_s: 1.0
  reference: https://www.itu.int/en/ITU-R/space/Pages/default.aspx
  notes: Engineering model for high-eccentricity and high-orbit Ka access experiments.
