terminal:
  id: rf-ka-meo-access
  display_name: Ka-band MEO access terminal
  medium: rf
  signal:
    band: ka
    frequency_hz: 30000000000
  bandwidth_mbps:
    transmit: 500
    receive: 500
  tracking_capacity: 1
  max_range_km: 30000
  limits:
    azimuth_deg:
      min: -180
      max: 180
    elevation_deg:
      min: -80
      max: 90
    max_tracking_rate_deg_s: 0.5
  reference: https://www.itu.int/en/ITU-R/space/Pages/default.aspx
  notes: Engineering model for MEO access experiments; range is sized for GPS-like altitude sat/ground links.
