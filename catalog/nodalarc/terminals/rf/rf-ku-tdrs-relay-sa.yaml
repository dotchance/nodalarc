terminal:
  id: rf-ku-tdrs-relay-sa
  display_name: TDRS relay Ku-band single-access terminal
  medium: rf
  signal:
    band: ku
    frequency_hz: 13775000000
  bandwidth_mbps:
    transmit: 50
    receive: 600
  tracking_capacity: 1
  max_range_km: 45000
  limits:
    azimuth_deg:
      min: -22
      max: 22
    elevation_deg:
      min: -28
      max: 28
    max_tracking_rate_deg_s: 0.5
  reference: https://www.eoportal.org/satellite-missions/tdrs
  notes: Ku single-access forward 13.775 GHz and return 15.0034 GHz; frequency_hz holds the forward center. 50 Mbps forward
    and 600 Mbps return. Field of regard about 22 by 28 degrees per eoPortal; slew estimated.
