# Coverage-88 — continuous multi-ground-station coverage constellation.
#
# 8 planes × 11 satellites = 88 total, 550 km altitude, 53° inclination.
# Walker-delta pattern with 45° RAAN spacing. Designed for guaranteed
# 2+ ground stations connected simultaneously when paired with the
# continuous-coverage ground station set (8 stations, 15° min elevation).
#
# OME-verified coverage: minimum 4 GS connected at all times across a
# full orbital period. Mean 6.95 GS connected.

mode: parametric
name: coverage-88
satellite_type: starlink-v2
orbit:
  altitude_km: 550
  inclination_deg: 53
  pattern: walker-delta
planes:
  count: 8
  raan_spacing_deg: 45
  sats_per_plane: 11
  phase_offset_deg: 4.1
