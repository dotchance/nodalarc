# Coverage-88 — 8 planes × 11 satellites = 88 total.
#
# 550 km altitude, 53° inclination, Walker-delta pattern with 45° RAAN
# spacing. When paired with the global-8 ground station set at 15° min
# elevation, OME preview shows minimum 4 GS connected simultaneously
# across a full orbital period. Coverage varies with different GS sets.

mode: parametric
name: coverage-88
satellite_type: starlink-v2
orbit:
  altitude_km: 550
  inclination_deg: 53
  pattern: walker-delta
planes:
  count: 8
  raan_spacing_deg: 45
  sats_per_plane: 11
  phase_offset_deg: 4.1
