# Demo-36: single orbital ring for quick demos and evaluation.
#
# 1 plane x 36 satellites at 550 km, 53 deg inclination. The ground
# track reaches 53N/53S, covering all demo ground stations including
# Frankfurt (50N). The ring sweeps diagonally across the US, giving
# passes over Hawthorne, Denver, and Ashburn.
#
# Intra-plane ISL distance: ~1206 km (chord distance at 550 km altitude, 10° separation).
# Cross-plane ISLs: none (single plane).

mode: parametric
name: demo-36
satellite_type: starlink-v2
orbit:
  altitude_km: 550
  inclination_deg: 53
  pattern: walker-delta
planes:
  count: 1
  raan_spacing_deg: 0
  sats_per_plane: 36
  phase_offset_deg: 10.0
