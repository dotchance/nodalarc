# GEO-RING-8 — geostationary equatorial ring.
#
# 1 plane x 8 satellites = 8 total, 35,786 km altitude, 0 deg inclination.
# A GEO regime (~24 h period, near-stationary over the equator) for the
# multi-regime demo: the outermost shell, one equatorial plane of slots.
mode: parametric
name: geo-ring-8
satellite_type: meo-geo-rf
orbit:
  altitude_km: 35786
  inclination_deg: 0
  pattern: walker-delta
planes:
  count: 1
  raan_spacing_deg: 0
  sats_per_plane: 8
  phase_offset_deg: 0
