# Kuiper-50 — inclined constellation for area design comparison.
#
# 5 planes × 10 satellites = 50 total, 590 km altitude, 51.9° inclination.
# Walker-delta pattern. No polar seam. Similar to starlink-early-44 but at
# different altitude and inclination for comparative analysis of area design
# tradeoffs in inclined constellations.

mode: parametric
name: kuiper-50
satellite_type: kuiper-v1
orbit:
  altitude_km: 590
  inclination_deg: 51.9
  pattern: walker-delta
planes:
  count: 5
  raan_spacing_deg: 36
  sats_per_plane: 10
  phase_offset_deg: 7.2
