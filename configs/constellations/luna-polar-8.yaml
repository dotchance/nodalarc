# Luna Polar 8 — small lunar relay shell for the first multi-body demo.
#
# 2 planes x 4 spacecraft = 8 total, 2,000 km altitude above the Moon, polar.
# The altitude is intentionally higher than very-low lunar orbit so the demo has
# useful access windows to the lunar surface while still visibly orbiting Luna.
mode: parametric
name: luna-polar-8
satellite_type: cislunar-relay-rf
orbit:
  altitude_km: 2000
  inclination_deg: 90
  pattern: walker-delta
planes:
  count: 2
  raan_spacing_deg: 90
  sats_per_plane: 4
  phase_offset_deg: 45
polar_seam:
  enabled: false
