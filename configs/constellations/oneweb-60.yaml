# OneWeb-60 — high-altitude near-polar constellation.
#
# 6 planes × 10 satellites = 60 total, 1200 km altitude, 87.9° inclination.
# Walker-star pattern. Higher altitude produces slower orbital dynamics,
# longer ground contact windows, and a different polar seam geometry
# compared to iridium-66. Useful for comparing how altitude affects
# routing convergence behavior under similar orbital patterns.

mode: parametric
name: oneweb-60
satellite_type: oneweb-gen2
orbit:
  altitude_km: 1200
  inclination_deg: 87.9
  pattern: walker-star
planes:
  count: 6
  raan_spacing_deg: 30
  sats_per_plane: 10
  phase_offset_deg: 6
polar_seam:
  enabled: true
  latitude_threshold_deg: 75
