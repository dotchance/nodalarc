mode: parametric
name: polar-seam-demo
orbit:
  altitude_km: 550
  inclination_deg: 97.4
  pattern: walker-star
planes:
  count: 4
  raan_spacing_deg: 90
  sats_per_plane: 8
  phase_offset_deg: 11.25
default_terminals:
  isl:
    - type: optical
      count: 4
      max_range_km: 5016
      bandwidth_mbps: 1000
      max_tracking_rate_deg_s: 3.0
  ground:
    - type: optical
      count: 1
      bandwidth_mbps: 1000
polar_seam:
  enabled: true
  latitude_threshold_deg: 75
