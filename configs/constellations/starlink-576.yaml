# Starlink-576 — 4-node cluster scale test.
#
# 48 planes x 12 satellites = 576 total, 550 km altitude, 53 deg inclination.
# Walker-delta pattern. Sized so planePerNode distributes 12 planes to each
# of 4 K3s nodes (144 sats/node — comfortably below the 176-sat-per-node
# ceiling validated on single-node starlink-176). RAAN spacing 360/48 = 7.5
# deg. Phase offset for Walker Delta F=1: 360/(48*12) = 0.625 deg.

mode: parametric
name: starlink-576
satellite_type: starlink-v2
orbit:
  altitude_km: 550
  inclination_deg: 53
  pattern: walker-delta
planes:
  count: 48
  raan_spacing_deg: 7.5
  sats_per_plane: 12
  phase_offset_deg: 0.625
