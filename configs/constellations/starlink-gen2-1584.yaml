# Starlink Generation 2 — Shell 1 Full Scale
#
# Real Shell 1: 72 planes × 22 satellites = 1,584 @ 550 km, 53.0° inclination
# This is the densest operational shell, covering mid-latitudes.
#
# Orbital parameters from FCC filing SAT-MOD-20200417-00037 and
# subsequent SpaceX Gen2 modifications (SAT-MOD-20230320-00029).
#
# Altitude: 550 km (original Shell 1, densest deployment)
# Inclination: 53.0° (mid-latitude coverage)
# Walker delta pattern: F=1
# Phase offset: 360/(72×22) = 0.2273° per satellite
# RAAN spacing: 360/72 = 5.0° between planes
#
# Polar seam: cross-plane ISLs disabled above 75° latitude.
# At 53° inclination, planes converge rapidly above 75°N/S,
# causing excessive Doppler and pointing rates on ISL terminals.
# Matches observed Starlink ISL behavior from ground-based tracking
# (Humphreys et al., 2023).
#
# ISL topology: 4 optical terminals per satellite.
#   2 intra-plane (forward + aft neighbors)
#   2 cross-plane (left + right neighbors)
# Intra-plane ISLs are always active. Cross-plane ISLs deactivate
# in the polar seam region.

mode: parametric
name: starlink-gen2-1584
satellite_type: starlink-v2-laser
orbit:
  altitude_km: 550
  inclination_deg: 53.0
  pattern: walker-delta
planes:
  count: 72
  raan_spacing_deg: 5.0
  sats_per_plane: 22
  phase_offset_deg: 0.2273
polar_seam:
  enabled: true
  latitude_threshold_deg: 75
