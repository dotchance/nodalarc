mode: parametric
name: starlink-mini
orbit:
  altitude_km: 550
  inclination_deg: 53
  pattern: walker-delta
planes:
  count: 6
  raan_spacing_deg: 30
  sats_per_plane: 10
  phase_offset_deg: 6
default_terminals:
  isl:
    - type: optical
      count: 4
      max_range_km: 5016
      bandwidth_mbps: 1000
      max_tracking_rate_deg_s: 3.0
  ground:
    - type: optical
      count: 1
      bandwidth_mbps: 1000
