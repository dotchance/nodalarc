# Starlink Shell 1 — 1/7 scale realistic geometry
#
# Real Shell 1: 72 planes × 22 sats = 1,584 @ 550 km, 53.0° inclination
# This config: 10 planes × 22 sats = 220 satellites
#
# Orbital parameters match FCC filing SAT-MOD-20200417-00037:
#   Altitude: 550 km
#   Inclination: 53.0°
#   22 satellites per plane (real Starlink in-plane spacing)
#
# RAAN spacing: 360/10 = 36° (real Shell 1: 5°)
# Phase offset: Walker delta F=1 → 360/(10×22) = 1.636°
#
# Polar seam: cross-plane ISLs disabled above 75° latitude due to
# high relative velocity between adjacent planes at convergence zones.
# Matches observed Starlink ISL behavior from ground-based tracking.

mode: parametric
name: starlink-shell1-220
satellite_type: starlink-v2-laser
orbit:
  altitude_km: 550
  inclination_deg: 53.0
  pattern: walker-delta
planes:
  count: 10
  raan_spacing_deg: 36
  sats_per_plane: 22
  phase_offset_deg: 1.636
polar_seam:
  enabled: true
  latitude_threshold_deg: 75
