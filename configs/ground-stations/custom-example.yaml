# Custom ground stations example
#
# Defines ground stations that satellites can communicate with.
# Each station has a geographic position and terminal configuration.
# Stations inherit defaults unless they specify overrides.

# Default terminal configuration for all ground stations.
# Can be overridden per-station below.
default_terminals:
  - type: optical           # Terminal type: "optical" or "rf"
    count: 1                # Number of terminals at each station
    bandwidth_mbps: 1000    # Link bandwidth in Mbps
    tracking_capacity: 1    # Max simultaneous satellite connections
    max_range_km: 2000
    field_of_regard_deg: 120
    max_tracking_rate_deg_s: 1.5
    boresight:
      mode: local_vertical

# Minimum elevation angle (degrees) for satellite visibility.
# Satellites below this angle are not schedulable for ground links.
default_min_elevation_deg: 25

# Scheduling policy when multiple satellites are visible simultaneously.
# Options: "highest-elevation" (prefer best signal), "lowest-elevation" (prefer
# satellites lower on the horizon), "longest-remaining-pass" (uses OME pass
# lookahead; requires selection_policy.params.lookahead_horizon_ticks).
default_selection_policy:
  name: highest-elevation
  params: {}

# Default terrestrial prefix templates for ground station routing.
# {gs_index} is replaced with the station's 0-based index.
# These prefixes are advertised into the constellation routing domain.
default_terrestrial_prefixes:
  ipv4_template: "172.16.{gs_index}.0/24"
  ipv6_template: "fd10::{gs_index}:0/112"
  metric: 10

# Ground station definitions.
# Each station gets a node_id of {namespace}-gs-{name} (e.g., ground-gs-new-york).
# Names must be unique and use lowercase with hyphens.
stations:
  - name: new-york          # Station name (used in node_id: ground-gs-new-york)
    lat_deg: 40.71           # Latitude in degrees (-90 to 90)
    lon_deg: -74.01          # Longitude in degrees (-180 to 180)
    alt_m: 10                # Altitude above sea level in meters

  - name: london
    lat_deg: 51.51
    lon_deg: -0.13
    alt_m: 11

  - name: tokyo
    lat_deg: 35.68
    lon_deg: 139.69
    alt_m: 40

  # Example station with per-station overrides:
  - name: polar-station
    lat_deg: 78.23           # High-latitude station (Svalbard)
    lon_deg: 15.63
    alt_m: 30
    # Override the default elevation mask for polar geometry
    min_elevation_deg: 10
    # Use the low-elevation heuristic since passes are shorter at high latitudes
    selection_policy:
      name: lowest-elevation
      params: {}
    # Override terminal capacity while preserving compatibility with the
    # optical satellite ground terminals in configs/constellations/custom-example.yaml.
    terminals:
      - type: optical
        count: 1
        bandwidth_mbps: 500
        tracking_capacity: 1
        max_range_km: 2000
        field_of_regard_deg: 120
        max_tracking_rate_deg_s: 1.5
        boresight:
          mode: local_vertical
    # Override terrestrial prefixes for this specific station
    terrestrial_prefixes:
      - prefix: "172.16.100.0/24"
        metric: 50
      - prefix: "fd10::100:0/112"
        metric: 50
