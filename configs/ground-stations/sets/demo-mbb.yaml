# Demo ground stations for the default simple LEO MBB session.
# Every station has two RF ground-link terminals so make-before-break
# handover is physically representable without mutating the reusable
# individual station catalog entries.
default_terminals:
- type: rf
  count: 2
  bandwidth_mbps: 10000
  tracking_capacity: 1
  max_range_km: 2000
  field_of_regard_deg: 120
  max_tracking_rate_deg_s: 1.5
  boresight:
    mode: local_vertical
  band: Ka
default_min_elevation_deg: 25
default_terrestrial_prefixes:
  ipv4_template: 172.16.{gs_index}.0/24
  ipv6_template: fd10::{gs_index}:0/112
  metric: 10
  default_route: true
  default_route_metric: 100
stations:
