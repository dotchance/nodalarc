ground_station_set:
  name: demo
  description: "7 stations across 6 continents for the demo-36 constellation."
  stations:
    - hawthorne
    - ashburn
    - denver
    - frankfurt
    - hartebeesthoek
    - singapore
    - tokyo
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
    default_route: true
    default_route_metric: 100
