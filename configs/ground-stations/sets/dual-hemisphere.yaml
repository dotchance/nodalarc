ground_station_set:
  name: dual-hemisphere
  description: "4 stations in two hemisphere pairs for continuous dual-coverage with 90-sat constellation"
  stations:
    - frankfurt
    - tokyo
    - santiago
    - sydney
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
