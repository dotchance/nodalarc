
# GEO commercial relay-style gateways. The terminal model is sized for GEO
# slant range; station names are representative demo gateways, not regulatory
# claims about a specific provider deployment.

default_terminals:
- type: rf
  count: 2
  bandwidth_mbps: 1000
  tracking_capacity: 1
  max_range_km: 45000
  field_of_regard_deg: 170
  max_tracking_rate_deg_s: 1.5
  boresight:
    mode: local_vertical
  band: Ka

default_min_elevation_deg: 5

default_terrestrial_prefixes:
  ipv4_template: "172.16.{gs_index}.0/24"
  ipv6_template: "fd10::{gs_index}:0/112"
  metric: 10
  default_route: true
  default_route_metric: 100

stations:
- name: goonhilly
  lat_deg: 50.05
  lon_deg: -5.18
  alt_m: 80
- name: usingen
  lat_deg: 50.33
  lon_deg: 8.53
  alt_m: 290
- name: perth
  lat_deg: -31.95
  lon_deg: 115.86
  alt_m: 30
- name: sydney
  lat_deg: -33.87
  lon_deg: 151.21
  alt_m: 58
- name: singapore
  lat_deg: 1.35
