
# GEO relay/TDRS-style gateways. Kept small and explicit for the demo catalog.

default_terminals:
- type: rf
  count: 2
  bandwidth_mbps: 1000
  tracking_capacity: 1
  max_range_km: 45000
  field_of_regard_deg: 170
  max_tracking_rate_deg_s: 1.5
  boresight:
    mode: local_vertical
  band: Ka

default_min_elevation_deg: 5

default_terrestrial_prefixes:
  ipv4_template: "172.16.{gs_index}.0/24"
  ipv6_template: "fd10::{gs_index}:0/112"
  metric: 10
  default_route: true
  default_route_metric: 100

stations:
- name: elbert
  lat_deg: 39.292528
  lon_deg: -104.504750
  alt_m: 2100
- name: cape-canaveral
  lat_deg: 28.543417
  lon_deg: -80.666639
  alt_m: 5
- name: apra-heights
  lat_deg: 13.408917
  lon_deg: 144.679194
  alt_m: 50
