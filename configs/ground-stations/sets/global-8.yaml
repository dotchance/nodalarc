ground_station_set:
  name: global-8
  description: "8 stations across major population centers and hemispheres. Coverage depends on constellation geometry — use coverage preview to verify."
  default_min_elevation_deg: 15
  stations:
    - frankfurt
    - tokyo
    - hawthorne
    - ashburn
    - santiago
    - sydney
    - sao-paulo
    - mumbai
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
