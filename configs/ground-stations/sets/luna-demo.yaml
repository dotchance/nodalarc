# Lunar surface stations for the first Luna demonstrator.
#
# Coordinates are Moon body-fixed lat/lon in the runtime's declared lunar frame.
# These are demo surface endpoints, not operational site claims.
default_terminals:
- type: rf
  band: S
  count: 2
  bandwidth_mbps: 100
  tracking_capacity: 1
  max_range_km: 12000
  field_of_regard_deg: 160
  max_tracking_rate_deg_s: 2.0
  boresight:
    mode: local_vertical
default_handover_mode: mbb
default_mbb_overlap_ticks: 3
default_mbb_reserve: 1
default_min_elevation_deg: 5
default_terrestrial_prefixes:
  ipv4_template: 172.40.{gs_index}.0/24
  ipv6_template: fd40::{gs_index}:0/112
  metric: 10
  default_route: true
  default_route_metric: 100
default_selection_policy:
  name: highest-elevation
  params: {}
default_handover_policy:
  name: hysteresis
  params:
    discount_factor: 1.10
    mask_fade_range_deg: 2.5
stations:
- name: artemis-base
  lat_deg: -89.9
  lon_deg: 0.0
  alt_m: 0.0
  min_elevation_deg: 5.0
  tenant_id: default
  reference_body: luna
  mobility: fixed
  service_priority: 5
- name: nearside-relay-site
  lat_deg: 0.0
  lon_deg: 0.0
  alt_m: 0.0
  min_elevation_deg: 5.0
  tenant_id: default
  reference_body: luna
  mobility: fixed
  service_priority: 10
