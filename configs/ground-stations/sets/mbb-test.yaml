ground_station_set:
  name: mbb-test
  description: >-
    6 stations for MBB handover testing. Near-inclination stations
    (dublin, warsaw, edmonton) see the highest handover rate. Mid-latitude
    (hawthorne, ashburn) see moderate rates. Southern hemisphere mirror
    (buenos-aires) validates cross-hemisphere behavior.
  stations:
    - dublin
    - warsaw
    - edmonton
    - hawthorne
    - ashburn
    - buenos-aires
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
    default_route: true
    default_route_metric: 100
