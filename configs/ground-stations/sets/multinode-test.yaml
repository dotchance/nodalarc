ground_station_set:
  name: multinode-test
  description: >-
    12 stations across 6 continents for multi-node validation.
    With rendezvous hashing on a 4-node cluster, expect ~3 GS per node.
    Stations selected for longitudinal spread to exercise cross-node
    ground links (GS and satellite on different K8s nodes).
  stations:
    - hawthorne
    - ashburn
    - edmonton
    - sao-paulo
    - dublin
    - frankfurt
    - cape-town
    - singapore
    - tokyo
    - sydney
    - auckland
    - punta-arenas
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
    default_route: true
    default_route_metric: 100
