ground_station_set:
  name: polar-emphasis
  description: "6 stations with high-latitude sites (Svalbard 78°N, McMurdo 78°S, Fairbanks 65°N). Best paired with near-polar constellations (86°+ inclination)."
  stations:
    - svalbard
    - mcmurdo
    - fairbanks
    - punta-arenas
    - frankfurt
    - hawthorne
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
