ground_station_set:
  name: starlink-176
  description: >-
    5 stations in the continuous coverage band (±51° to ±55° latitude)
    for the starlink-176 constellation (16×11, 550km, 53° inclination).
    Longitudinally separated to prevent satellite terminal contention —
    no two stations share visible satellites. Verified 0% coverage gaps
    at 25° minimum elevation with global capacity-aware scheduling.
  stations:
    - edmonton
    - dublin
    - warsaw
    - punta-arenas
    - stanley
  default_handover_mode: mbb
  default_mbb_overlap_ticks: 3
  default_mbb_reserve: 1
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
    default_route: true
    default_route_metric: 100
