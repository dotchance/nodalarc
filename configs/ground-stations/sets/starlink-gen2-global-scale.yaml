ground_station_set:
  name: starlink-gen2-global-scale
  description: >-
    86 Starlink gateway ground stations for scale testing.
    66 US stations with FCC filing-exact coordinates.
    20 international stations at known Starlink gateway locations
    (geocoded coordinates, pending national regulator filing data).
  default_min_elevation_deg: 25
  default_terminals:
    - type: rf
      count: 8
      bandwidth_mbps: 10000
      tracking_capacity: 8
  stations:
    # === FCC-verified US stations (66) ===
    - adelanto
    - anchorage
    - apra-heights
    - arbuckle
    - arlington-or
    - atlanta
    - bandon
    - baxley
    - beekmantown
    - bellingham
    - blountsville
    - boca-chica
    - butte
    - cal-nev-ari
    - cape-canaveral
    - cass-county
    - chapel-hill
    - charleston
    - coalville
    - colburn
    - columbus
    - conrad
    - cook
    - dallas
    - des-moines-nm
    - downtown-la
    - dubuque
    - elbert
    - flushing
    - greenville
    - guam-katu-gato
    - hawthorne
    - hillsboro
    - hitterdal
    - inman
    - kalama
    - kenansville
    - litchfield
    - loring
    - manistique
    - marshall
    - mcgregor
    - merrillan
    - nemaha
    - new-braunfels
    - north-bend
    - north-kansas-city
    - panaca
    - phoenix
    - prosser
    - prudhoe-bay
    - redmond
    - robertsdale
    - roll
    - romulus
    - san-jose
    - sanderson
    - savanna-ok
    - slope-county
    - springer
    - tionesta
    - toa-baja
    - tulelake
    - vandenberg
    - warren
    # === International stations (20) ===
    - goonhilly
    - usingen
    - dublin
    - amsterdam
    - frankfurt
    - berlin
    - warsaw
    - manchester
    - edmonton
    - tokyo
    - sydney
    - warkworth
    - gravelly-beach
    - sao-paulo
    - singapore
    - mumbai
    - hartebeesthoek
    - djibouti
    - punta-arenas
    - santiago
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
    default_route: true
    default_route_metric: 100
