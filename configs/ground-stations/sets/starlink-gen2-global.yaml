ground_station_set:
  name: starlink-gen2-global
  description: >-
    56 Starlink gateway ground stations worldwide for scale testing with
    the 53° inclination Shell 1 constellation. Coordinates from FCC earth
    station filings (US) and verified geographic data (international).
    Terminal counts defined in individual station YAML files.
  default_min_elevation_deg: 25
  stations:
    # North America (18)
    - conrad
    - merrillan
    - redmond
    - brewster
    - greenville
    - ashburn
    - hawthorne
    - denver
    - boca-chica
    - buford
    - loring
    - north-bend
    - kalama
    - beekmantown
    - litchfield
    - robertsdale
    - colburn
    - edmonton
    # Caribbean / Pacific (4)
    - cayey
    - waimanalo
    - guadalajara
    - tulum
    # South America (6)
    - sao-paulo
    - santiago
    - buenos-aires
    - bogota
    - manaus
    - punta-arenas
    # Europe (12)
    - goonhilly
    - usingen
    - london
    - dublin
    - amsterdam
    - frankfurt
    - berlin
    - warsaw
    - manchester
    - gravelines
    - bordeaux
    - ceuta
    # Africa (5)
    - hartebeesthoek
    - djibouti
    - lagos
    - accra
    - nairobi
    # Asia (5)
    - tokyo
    - mumbai
    - singapore
    - manila
    - jakarta
    # Oceania (6)
    - sydney
    - perth
    - warkworth
    - gravelly-beach
    - auckland
    - punaluu
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
    default_route: true
    default_route_metric: 100
