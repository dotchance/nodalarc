ground_station_set:
  name: starlink-gen2-global
  description: >-
    60 Starlink gateway ground stations worldwide for scale testing with
    the 53° inclination Shell 1 constellation. All stations within ±55°
    latitude have strong visibility. Higher-latitude stations (Dublin,
    Manchester, Edmonton) have reduced but viable coverage at 53° incl.
    McMurdo, Fairbanks, and Svalbard excluded — they need polar shells.

    Terminal counts: default 4 terminals per station (tracking_capacity=4,
    3 steady + 1 MBB reserve). Major gateway sites should be overridden
    with higher counts per FCC filings when available.

    Coordinates sourced from FCC earth station filings, SpaceX public
    disclosures, and verified geographic data.
  default_min_elevation_deg: 25
  default_terminals:
    - type: rf
      count: 4
      bandwidth_mbps: 2000
      tracking_capacity: 4
      band: Ka
  stations:
