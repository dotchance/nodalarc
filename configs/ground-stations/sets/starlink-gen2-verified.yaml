ground_station_set:
  name: starlink-gen2-verified
  description: >-
    65 Starlink gateway ground stations with FCC filing-exact coordinates.
    All coordinates sourced from FCC IBFS earth station filings with
    6-decimal-place precision. No geocoded approximations.
    Antenna counts and diameters from filing specifications.
  default_min_elevation_deg: 25
  default_terminals:
    - type: rf
      count: 8
      bandwidth_mbps: 10000
      tracking_capacity: 8
  stations:
    - adelanto
    - anchorage
    - apra-heights
    - arbuckle
    - arlington-or
    - atlanta
    - bandon
    - baxley
    - beekmantown
    - bellingham
    - blountsville
    - boca-chica
    - butte
    - cal-nev-ari
    - cape-canaveral
    - cass-county
    - chapel-hill
    - charleston
    - coalville
    - colburn
    - columbus
    - conrad
    - cook
    - dallas
    - des-moines-nm
    - downtown-la
    - dubuque
    - elbert
    - flushing
    - greenville
    - guam-katu-gato
    - hawthorne
    - hillsboro
    - hitterdal
    - inman
    - kalama
    - kenansville
    - litchfield
    - loring
    - manistique
    - marshall
    - mcgregor
    - merrillan
    - nemaha
    - new-braunfels
    - north-kansas-city
    - panaca
    - phoenix
    - prosser
    - prudhoe-bay
    - redmond
    - robertsdale
    - roll
    - romulus
    - san-jose
    - sanderson
    - savanna-ok
    - slope-county
    - springer
    - tionesta
    - toa-baja
    - tulelake
    - vandenberg
    - warren
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
    default_route: true
    default_route_metric: 100
