ground_station_set:
  name: starlink-scale
  description: >-
    15 non-polar stations with wide longitudinal spread, for scale-testing
    starlink-class constellations at 53 deg inclination. All stations are
    within ±55 deg latitude so they actually see the constellation's
    visibility band. No McMurdo, Svalbard, or Fairbanks — those are useless
    at 53 deg inclination. Default terminal definitions come from each
    station's individual YAML in configs/ground-stations/stations/.
  default_min_elevation_deg: 15
  stations:
    # Americas (west to east)
    - hawthorne
    - denver
    - ashburn
    - santiago
    - sao-paulo
    - stanley
    # Europe
    - dublin
    - frankfurt
    - warsaw
    # Africa / Middle East
    - hartebeesthoek
    - djibouti
    # Asia / Oceania
    - mumbai
    - singapore
    - tokyo
    - sydney
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
    default_route: true
    default_route_metric: 100
