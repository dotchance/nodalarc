ground_station_set:
  name: transatlantic
  description: "3 stations: Ashburn (US East), London, Frankfurt. For studying cross-Atlantic forwarding paths between North America and Europe."
  stations:
    - ashburn
    - london
    - frankfurt
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
