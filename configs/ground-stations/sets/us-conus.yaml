ground_station_set:
  name: us-conus
  description: "2 stations: Hawthorne (US West) and Ashburn (US East). Minimal deployment for testing US-only connectivity."
  stations:
    - hawthorne
    - ashburn
  default_terrestrial_prefixes:
    ipv4_template: "172.16.{gs_index}.0/24"
    ipv6_template: "fd10::{gs_index}:0/112"
    metric: 10
