# Gravelly Beach, Tasmania, Australia — Starlink Gateway
# Southern hemisphere near the orbital inclination mirror (41°S vs 53°).
# Provides Australian coverage and southern ISL path anchoring.
ground_station:
  name: gravelly-beach
  lat_deg: -41.27
  lon_deg: 146.05
  alt_m: 10
  min_elevation_deg: 25
  terminals:
    - type: rf
      count: 1
      bandwidth_mbps: 1000
      tracking_capacity: 1
      max_range_km: 2000
      field_of_regard_deg: 120
      max_tracking_rate_deg_s: 1.5
      boresight:
        mode: local_vertical
        half_angle_deg: 60
