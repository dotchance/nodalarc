# Usingen, Germany — Starlink Gateway
# Central European gateway. Near orbital inclination (50.3°N).
# Hilly terrain (Taunus mountains to the south).
ground_station:
  name: usingen
  lat_deg: 50.33
  lon_deg: 8.53
  alt_m: 290
  min_elevation_deg: 25
  terminals:
    - type: rf
      count: 1
      bandwidth_mbps: 1000
      tracking_capacity: 1
      max_range_km: 2000
      field_of_regard_deg: 120
      max_tracking_rate_deg_s: 1.5
      boresight:
        mode: local_vertical
        half_angle_deg: 60
