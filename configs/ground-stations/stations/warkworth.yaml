# Warkworth, New Zealand — Starlink Gateway
# Southern hemisphere gateway. Rural site north of Auckland.
# Provides coverage for Oceania and trans-Pacific routing.
ground_station:
  name: warkworth
  lat_deg: -36.43
  lon_deg: 174.66
  alt_m: 60
  min_elevation_deg: 25
  terminals:
    - type: rf
      count: 1
      bandwidth_mbps: 1000
      tracking_capacity: 1
      max_range_km: 2000
      field_of_regard_deg: 120
      max_tracking_rate_deg_s: 1.5
      boresight:
        mode: local_vertical
        half_angle_deg: 60
