name: iridium-66
description: "6 planes x 11 satellites, 780 km polar orbit. Canonical polar seam constellation."
satellite_count: 66
constellation: configs/constellations/iridium-66.yaml
ground_stations: configs/ground-stations/sets/polar-emphasis.yaml
time:
  mode: discrete-event
  step_seconds: 1
traffic_flows:
  - flow_id: svalbard-to-mcmurdo
    src: gs-svalbard
    dst: gs-mcmurdo
    protocol: udp
    bandwidth_kbps: 100
    probe_type: continuous
convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
