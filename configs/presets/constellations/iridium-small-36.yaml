name: iridium-small-36
description: "6 planes x 6 satellites, 780 km polar orbit. Fast-iteration polar seam."
satellite_count: 36
constellation: configs/constellations/iridium-small-36.yaml
ground_stations: configs/ground-stations/sets/polar-emphasis.yaml
time:
  step_seconds: 1
traffic_flows:
  - flow_id: svalbard-to-mcmurdo
    src: gs-svalbard
    dst: gs-mcmurdo
    protocol: udp
    bandwidth_kbps: 100
    probe_type: continuous
