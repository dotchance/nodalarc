name: kuiper-50
description: "5 planes x 10 satellites, 590 km inclined orbit. Area design comparison."
satellite_count: 50
constellation: configs/constellations/kuiper-50.yaml
ground_stations: configs/ground-stations/sets/global.yaml
time:
  step_seconds: 1
traffic_flows:
  - flow_id: ashburn-to-frankfurt
    src: gs-ashburn
    dst: gs-frankfurt
    protocol: udp
    bandwidth_kbps: 100
    probe_type: continuous
convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
