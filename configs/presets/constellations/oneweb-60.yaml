name: oneweb-60
description: "6 planes x 10 satellites, 1200 km near-polar orbit. Slow dynamics, long contacts."
satellite_count: 60
constellation: configs/constellations/oneweb-60.yaml
ground_stations: configs/ground-stations/sets/polar-emphasis.yaml
time:
  mode: discrete-event
  step_seconds: 1
traffic_flows:
  - flow_id: svalbard-to-mcmurdo
    src: gs-svalbard
    dst: gs-mcmurdo
    protocol: udp
    bandwidth_kbps: 100
    probe_type: continuous
convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
