name: starlink-early-44
description: "4 planes x 11 satellites, 550 km inclined orbit. Stable ISLs, no polar seam."
satellite_count: 44
constellation: configs/constellations/starlink-early-44.yaml
ground_stations: configs/ground-stations/sets/global.yaml
time:
  step_seconds: 1
traffic_flows:
  - flow_id: ashburn-to-frankfurt
    src: gs-ashburn
    dst: gs-frankfurt
    protocol: udp
    bandwidth_kbps: 100
    probe_type: continuous
convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
