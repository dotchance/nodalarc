stack:
  name: frr-isis-sr
  image: nodalarc/frr:10
  daemons:
    - zebra
    - isisd
    - pathd
  config_templates:
    - src: zebra.conf.j2
      dst: /etc/frr/zebra.conf
    - src: isisd.conf.j2
      dst: /etc/frr/isisd.conf
    - src: pathd.conf.j2
      dst: /etc/frr/pathd.conf
  template_variables:
    srgb_start: 16000
    srgb_end: 23999
    reference_bandwidth: 10000
  segment_routing: true
  mi_adapter: frr_isis_adapter
  max_compression: 10
  reconfigure_command: "vtysh -f {config_path}"
