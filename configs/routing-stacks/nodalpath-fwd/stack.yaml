stack:
  name: nodalpath-fwd
  image: nodalpath-fwd:latest
  daemons: []
  config_templates:
    - src: peers.json.j2
      dst: /etc/nodalpath/peers.json
  template_variables:
    grpc_port: 50051
  security_context:
    capabilities:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
  env:
    - name: NODE_ID
      value: "{{ node_id }}"
    - name: GRPC_PORT
      value: "50051"
    - name: PEERS_PATH
      value: "/etc/nodalpath/peers.json"
  host_setup:
    modprobe:
      - mpls_router
      - mpls_iptunnel
  transport: grpc
  mi_adapter: null
  max_compression: 10
