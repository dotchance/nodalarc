# Earth cislunar gateway relay.
#
# A GEO-class relay platform with long-haul optical ISLs for the Earth-Luna hop
# and an Earth-facing C-band ground terminal for gateway-site downlink.
satellite_type:
  name: earth-cislunar-gateway-rf
  description: "Earth-side cislunar gateway with optical relay ISLs and C-band Earth gateway access."

  isl_terminals:
    - type: optical
      count: 4
      max_range_km: 500000
      bandwidth_mbps: 1000
      max_tracking_rate_deg_s: 5.0
      field_of_regard_deg: 360

  ground_terminals:
    - type: rf
      band: C
      count: 1
      bandwidth_mbps: 250
      max_range_km: 45000
      field_of_regard_deg: 110
      max_tracking_rate_deg_s: 0.05
      boresight:
        target_body: earth
        mode: nadir
