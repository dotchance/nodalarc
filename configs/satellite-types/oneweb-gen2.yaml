# OneWeb Gen2 — optical ISLs with RF ground terminals.
#
# Based on OneWeb's announced ISL-capable generation. Higher altitude
# (1200 km) produces slower orbital dynamics and longer ground contact
# windows compared to LEO constellations.

satellite_type:
  name: oneweb-gen2
  description: "OneWeb Gen2 optical ISL with Ka-band ground terminals"

  isl_terminals:
    - type: optical
      count: 4
      max_range_km: 5500
      bandwidth_mbps: 50
      max_tracking_rate_deg_s: 2.5
      field_of_regard_deg: 130

  ground_terminals:
    - type: rf
      band: Ka
      count: 1
      bandwidth_mbps: 500
