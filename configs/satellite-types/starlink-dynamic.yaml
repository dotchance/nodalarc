# Starlink-Dynamic — terminal config for the dynamic ISL test constellation.
#
# 4 optical ISLs at 3200 km range with 10 Gbps bandwidth and lower
# tracking rate (2.0 deg/s), producing dynamic cross-plane ISL drops
# near the equator.

satellite_type:
  name: starlink-dynamic
  description: "Test config for dynamic ISL constellation"

  isl_terminals:
    - type: optical
      count: 4
      max_range_km: 3200
      bandwidth_mbps: 10000
      max_tracking_rate_deg_s: 2.0

  ground_terminals:
    - type: optical
      count: 1
      bandwidth_mbps: 1000
