# Starlink-Mini — terminal config for the starlink-mini test constellation.
#
# 4 optical ISLs at 5016 km range with 10 Gbps bandwidth.
# Used by starlink-mini.yaml and polar-seam-demo.yaml test constellations.

satellite_type:
  name: starlink-mini
  description: "Test config for starlink-mini constellation"

  isl_terminals:
    - type: optical
      count: 4
      max_range_km: 5016
      bandwidth_mbps: 10000
      max_tracking_rate_deg_s: 3.0

  ground_terminals:
    - type: optical
      count: 1
      bandwidth_mbps: 1000
