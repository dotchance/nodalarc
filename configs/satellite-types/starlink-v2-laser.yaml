# Starlink v2 Mini — optical laser ISL platform
#
# Orbital parameters from FCC filing SAT-MOD-20200417-00037 (Shell 1)
# and Gen2 modifications (FCC-22-91, DA-26-36).
#
# ISL specs from SpaceX disclosures and independent analysis:
#   4 optical terminals per satellite (confirmed via FCC filing)
#   2 intra-plane (forward + aft neighbors)
#   2 cross-plane (left + right adjacent planes)
#   Wavelength: ~1550 nm (near-infrared)
#   Bandwidth: 100 Gbps per link (SpaceX disclosure)
#   Max range: ~5,016 km (geometry-limited at 550 km orbital altitude)
#
# Ground terminal: Ka-band gateway downlink, E-band for Gen2 backhaul.
# User terminals use Ku-band (not modeled as gateway terminals).

satellite_type:
  name: starlink-v2-laser
  description: "Starlink v2 Mini with optical laser ISLs"

  isl_terminals:
    - type: optical
      band: "1550nm"
      count: 4
      max_range_km: 5016
      bandwidth_mbps: 100000
      max_tracking_rate_deg_s: 3.0
      field_of_regard_deg: 140

  ground_terminals:
    - type: rf
      count: 1
      bandwidth_mbps: 10000
      max_range_km: 2000
      field_of_regard_deg: 120
      max_tracking_rate_deg_s: 1.5
      boresight:
        target_body: earth
        mode: nadir
      band: Ka
