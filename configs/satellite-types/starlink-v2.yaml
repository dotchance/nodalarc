# Starlink Gen2 — optical laser ISLs.
#
# Based on published Starlink Gen2 laser ISL specifications. All four
# terminals are pooled (no dedicated intra/cross-plane role), allocated
# by the Section 13.4 priority rules.

satellite_type:
  name: starlink-v2
  description: "Starlink Gen2 optical laser ISL platform"

  isl_terminals:
    - type: optical
      count: 4
      max_range_km: 5000
      bandwidth_mbps: 100
      max_tracking_rate_deg_s: 3.0
      field_of_regard_deg: 140

  ground_terminals:
    - type: rf
      count: 1
      bandwidth_mbps: 1000
      max_range_km: 2000
      field_of_regard_deg: 120
      max_tracking_rate_deg_s: 1.5
      boresight:
        target_body: earth
        mode: nadir
        half_angle_deg: 60
      band: Ku
      beam_falloff_exponent: 2.0
