scenario:
  name: compound-failure
  description: "Sequential ISL failures — second failure injected while first is still down"

  steps:
    - action: wait
      duration_s: 300    # 5 min observation

    - action: measure
      duration_s: 30

    # First ISL failure
    - action: inject_link_down
      node_a: sat-P02S03
      node_b: sat-P02S04

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    # Second ISL failure on a different link, 2 minutes later
    - action: wait
      duration_s: 120

    - action: inject_link_down
      node_a: sat-P03S05
      node_b: sat-P04S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    # Wait 5 minutes with both links down
    - action: wait
      duration_s: 300

    # Recover both links
    - action: inject_link_up
      node_a: sat-P02S03
      node_b: sat-P02S04

    - action: inject_link_up
      node_a: sat-P03S05
      node_b: sat-P04S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
