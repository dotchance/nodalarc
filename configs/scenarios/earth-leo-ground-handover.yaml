
scenario:
  name: earth-leo-ground-handover
  description: "Observe ground-station satellite handover and routing behavior in a LEO session."
  traffic_flows:
    - flow_id: ground-handover-flow
      src: ground-gs-hawthorne
      dst: ground-gs-ashburn
      protocol: udp
      bandwidth_kbps: 1000
      probe_type: continuous
  steps:
    - action: wait
      duration_s: 30
    - action: measure
      duration_s: 300
    - action: wait
      duration_s: 300
    - action: measure
      duration_s: 300
