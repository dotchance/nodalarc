scenario:
  name: ground-handover
  description: "Observe ground station satellite handover and routing reconvergence"

  traffic_flows:
    - flow_id: gs-handover-flow
      src: gs-hawthorne
      dst: gs-ashburn
      protocol: udp
      bandwidth_kbps: 1000
      probe_type: continuous

  steps:
    - action: wait
      duration_s: 30

    - action: measure
      duration_s: 300    # 5 min window — captures at least one handover

    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 300    # second window for comparison
