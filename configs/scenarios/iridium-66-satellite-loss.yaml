# Satellite loss at a cross-plane junction node. sat-P03S05 has both intra-plane
# and cross-plane ISLs; losing it disrupts 4 links and forces the most rerouting.
scenario:
  name: iridium-66-satellite-loss
  description: "Complete loss of cross-plane junction node on iridium-66"

  traffic_flows:
    - flow_id: iridium-loss-flow
      src: gs-svalbard
      dst: gs-mcmurdo
      protocol: udp
      bandwidth_kbps: 1000
      probe_type: continuous

  steps:
    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30

    - action: inject_satellite_loss
      node: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30
