# Two cross-plane failures isolating plane 03 on the smaller iridium constellation.
scenario:
  name: iridium-small-36-compound-failure
  description: "Sequential cross-plane ISL failures isolating plane 03 on iridium-small-36"

  steps:
    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30

    - action: inject_link_down
      node_a: sat-P02S03
      node_b: sat-P03S03

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 120

    - action: inject_link_down
      node_a: sat-P03S03
      node_b: sat-P04S03

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: inject_link_up
      node_a: sat-P02S03
      node_b: sat-P03S03

    - action: inject_link_up
      node_a: sat-P03S03
      node_b: sat-P04S03

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
