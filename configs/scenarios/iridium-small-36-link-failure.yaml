# Cross-plane ISL failure on the thinner iridium constellation.
# With only 6 sats/plane, slot 03 is mid-orbit.
scenario:
  name: iridium-small-36-link-failure
  description: "ISL failure on iridium-small-36 cross-plane link"

  steps:
    - action: wait
      duration_s: 300

    - action: inject_link_down
      node_a: sat-P02S03
      node_b: sat-P03S03

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: inject_link_up
      node_a: sat-P02S03
      node_b: sat-P03S03

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
