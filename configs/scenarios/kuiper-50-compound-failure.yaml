# Two cross-plane failures on kuiper-50. Isolates plane 03
# from both neighbors (P02↔P03 and P03↔P04).
scenario:
  name: kuiper-50-compound-failure
  description: "Sequential cross-plane ISL failures isolating plane 03 on kuiper-50"

  steps:
    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30

    - action: inject_link_down
      node_a: sat-P02S05
      node_b: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 120

    - action: inject_link_down
      node_a: sat-P03S05
      node_b: sat-P04S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: inject_link_up
      node_a: sat-P02S05
      node_b: sat-P03S05

    - action: inject_link_up
      node_a: sat-P03S05
      node_b: sat-P04S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
