# Cross-plane ISL failure on kuiper-50. P02↔P03 at slot 05.
scenario:
  name: kuiper-50-link-failure
  description: "ISL failure on kuiper-50 cross-plane link"

  steps:
    - action: wait
      duration_s: 300

    - action: inject_link_down
      node_a: sat-P02S05
      node_b: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: inject_link_up
      node_a: sat-P02S05
      node_b: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
