# Satellite loss on kuiper-50. sat-P02S05 is a mid-plane, mid-orbit junction.
scenario:
  name: kuiper-50-satellite-loss
  description: "Complete loss of mid-plane junction node on kuiper-50"

  traffic_flows:
    - flow_id: kuiper-loss-flow
      src: gs-hawthorne
      dst: gs-frankfurt
      protocol: udp
      bandwidth_kbps: 1000
      probe_type: continuous

  steps:
    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30

    - action: inject_satellite_loss
      node: sat-P02S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30
