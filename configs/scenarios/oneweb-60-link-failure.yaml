# Cross-plane ISL failure on oneweb-60. Higher altitude (1200 km) produces
# slower dynamics — convergence should be faster than iridium-66.
scenario:
  name: oneweb-60-link-failure
  description: "ISL failure on oneweb-60 cross-plane link"

  steps:
    - action: wait
      duration_s: 300

    - action: inject_link_down
      node_a: sat-P02S05
      node_b: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: inject_link_up
      node_a: sat-P02S05
      node_b: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
