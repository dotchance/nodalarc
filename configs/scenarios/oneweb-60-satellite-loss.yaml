# Satellite loss at cross-plane junction on oneweb-60.
scenario:
  name: oneweb-60-satellite-loss
  description: "Complete loss of cross-plane junction node on oneweb-60"

  traffic_flows:
    - flow_id: oneweb-loss-flow
      src: gs-svalbard
      dst: gs-mcmurdo
      protocol: udp
      bandwidth_kbps: 1000
      probe_type: continuous

  steps:
    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30

    - action: inject_satellite_loss
      node: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30
