# Two cross-plane failures on starlink-early-44. With only 4 planes,
# losing P01↔P02 and P02↔P03 isolates plane 02 from both neighbors.
scenario:
  name: starlink-early-44-compound-failure
  description: "Sequential cross-plane ISL failures isolating plane 02 on starlink-early-44"

  steps:
    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30

    - action: inject_link_down
      node_a: sat-P01S05
      node_b: sat-P02S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 120

    - action: inject_link_down
      node_a: sat-P02S05
      node_b: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: inject_link_up
      node_a: sat-P01S05
      node_b: sat-P02S05

    - action: inject_link_up
      node_a: sat-P02S05
      node_b: sat-P03S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
