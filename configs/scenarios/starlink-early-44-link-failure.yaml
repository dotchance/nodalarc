# Cross-plane ISL failure on starlink-early-44. Inclined constellation (53°) —
# cross-plane links are stable, so failure/recovery is purely from injection.
# P01↔P02 at slot 05 sits on a high-traffic path between ground stations.
scenario:
  name: starlink-early-44-link-failure
  description: "ISL failure on starlink-early-44 cross-plane link"

  steps:
    - action: wait
      duration_s: 300

    - action: inject_link_down
      node_a: sat-P01S05
      node_b: sat-P02S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: inject_link_up
      node_a: sat-P01S05
      node_b: sat-P02S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
