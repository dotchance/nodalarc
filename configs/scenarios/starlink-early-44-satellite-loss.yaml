# Satellite loss on starlink-early-44. sat-P02S05 is a high-traffic-path node
# on the middle plane.
scenario:
  name: starlink-early-44-satellite-loss
  description: "Complete loss of high-traffic node on starlink-early-44"

  traffic_flows:
    - flow_id: starlink-loss-flow
      src: gs-hawthorne
      dst: gs-frankfurt
      protocol: udp
      bandwidth_kbps: 1000
      probe_type: continuous

  steps:
    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30

    - action: inject_satellite_loss
      node: sat-P02S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30
