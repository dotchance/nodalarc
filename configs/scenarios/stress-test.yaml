scenario:
  name: stress-test
  description: "Chained multi-event: steady-state, ISL failure, handover observation, satellite loss, recovery"

  traffic_flows:
    - flow_id: stress-flow
      src: gs-hawthorne
      dst: gs-ashburn
      protocol: udp
      bandwidth_kbps: 1000
      probe_type: continuous

  steps:
    # Phase 1: steady-state observation (3 min)
    - action: wait
      duration_s: 180

    - action: measure
      duration_s: 30

    # Phase 2: ISL failure + convergence
    - action: inject_link_down
      node_a: sat-P02S03
      node_b: sat-P02S04

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    # Phase 3: ground handover observation (5 min with link still down)
    - action: wait
      duration_s: 300

    - action: measure
      duration_s: 30

    # Phase 4: satellite loss (with ISL still down)
    - action: inject_satellite_loss
      node: sat-P01S05

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    # Phase 5: recover ISL (satellite still missing)
    - action: inject_link_up
      node_a: sat-P02S03
      node_b: sat-P02S04

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
