scenario:
  name: time-mode-validation
  description: "Validate Discrete-Event Mode produces representative routing behavior vs Real-Time"

  traffic_flows:
    - flow_id: time-mode-flow
      src: gs-hawthorne
      dst: gs-ashburn
      protocol: udp
      bandwidth_kbps: 1000
      probe_type: continuous

  steps:
    - action: wait
      duration_s: 300     # 5 min observation window

    - action: measure
      duration_s: 60

    - action: inject_link_down
      node_a: sat-P02S03
      node_b: sat-P02S04

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30

    - action: inject_link_up
      node_a: sat-P02S03
      node_b: sat-P02S04

    - action: wait_converge
      timeout_s: 60

    - action: measure
      duration_s: 30
