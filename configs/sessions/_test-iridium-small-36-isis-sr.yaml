session:
  name: iridium-small-36-isis-sr
constellation: configs/constellations/iridium-small-36.yaml
ground_stations: configs/ground-stations/sets/polar-emphasis.yaml
routing:
  protocol: isis
  extensions:
  - sr
  area_assignment:
    strategy: flat
    gs_area_id: '49.0001'
time:
  step_seconds: 1
traffic_flows:
- flow_id: svalbard-to-mcmurdo
  src: gs-svalbard
  dst: gs-mcmurdo
  protocol: udp
  bandwidth_kbps: 100
  probe_type: continuous
