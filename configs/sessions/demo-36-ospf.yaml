# Demo-36 with OSPF: single orbital ring, 36 satellites, 7 ground stations.
# Good for quick demos, evaluation, and learning. Deploys in under a minute.
session:
  name: demo-36-ospf

constellation: configs/constellations/demo-36.yaml
ground_stations: configs/ground-stations/sets/demo.yaml

simulation:
  schema_version: 2
  ground_link_model: terminal_physics

orbit:
  propagator: j2-mean-elements

scheduling:
  ground:
    selection_policy:
      name: highest-elevation
      params: {}
    handover_policy:
      name: hysteresis
      params:
        discount_factor: 1.15
        mask_fade_range_deg: 5.0
    handover_mode: bbm
    mbb_overlap_ticks: 0
    mbb_reserve: 0

dispatch:
  latency_authority: ome
  max_latency_age_ticks: 1
  substrate_compensation:
    measurement_source: node-agent-rtt
    rtt_to_one_way: half-rtt

routing:
  protocol: ospf
  area_assignment:
    strategy: flat

time:
  step_seconds: 1
