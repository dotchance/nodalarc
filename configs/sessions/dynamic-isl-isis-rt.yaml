session:
  name: dynamic-isl-isis-rt
  data_dir: /tmp/nodalarc/sessions

constellation: configs/constellations/starlink-dynamic.yaml
ground_stations: configs/ground-stations/global-default.yaml

addressing:
  sat_id_template: "sat-P{plane:02d}S{slot:02d}"
  gs_id_template: "gs-{name}"

routing:
  stack: configs/routing-stacks/frr-isis-sr
  area_assignment:
    strategy: stripe
    planes_per_stripe: 2
    gs_area_id: "49.0000"

time:
  mode: realtime
  compression: 5
  step_seconds: 1
  latency_update_interval_seconds: 10

convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
