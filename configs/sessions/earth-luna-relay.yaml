session:
  name: earth-luna-relay
identity:
  mode: segment_namespaced
segments:
- id: earth-relay
  kind: space_node
  namespace: earth-relay
  central_body: earth
  satellite_type: cislunar-relay-rf
  tags:
  - earth
  - relay
  - cislunar
  node:
    id: gateway
    state:
      altitude_km: 35786
      inclination_deg: 0
      raan_deg: 0
      true_anomaly_deg: 0
    tags:
    - gateway
- id: luna-relay
  kind: constellation
  source: configs/constellations/luna-polar-8.yaml
  namespace: luna
  central_body: luna
  tags:
  - luna
  - polar
  - relay
- id: lunar-ground
  kind: ground_set
  source: configs/ground-stations/sets/luna-demo.yaml
  namespace: lunar-ground
  reference_body: luna
  tags:
  - luna
  - ground
  - demo
  scheduling:
    selection_policy:
      name: highest-elevation
      params: {}
    handover_policy:
      name: hysteresis
      params:
        discount_factor: 1.10
        mask_fade_range_deg: 2.5
    handover_mode: mbb
    mbb_overlap_ticks: 3
    mbb_reserve: 1
link_rules:
- id: lunar-ground-access
  kind: access
  endpoints:
  - selector:
      segment: lunar-ground
    terminal_role: ground
    terminal_medium: rf
  - selector:
      segment: luna-relay
    terminal_role: ground
    terminal_medium: rf
  topology:
    mode: visible_candidates
- id: earth-luna-static-relay
  kind: inter_body_relay
  endpoints:
  - selector:
      segment: earth-relay
    terminal_role: isl
    terminal_medium: optical
  - selector:
      segment: luna-relay
    terminal_role: isl
    terminal_medium: optical
  topology:
    mode: nearest_n
    n: 1
  protocol_boundary:
    enabled: true
    adapter: static_ip
    routing_domain_a: earth-domain
    routing_domain_b: luna-domain
simulation:
  schema_version: 2
  ground_link_model: terminal_physics
  candidate_limits:
    max_pairs_per_rule: 128
    max_pairs_per_tick: 256
ephemeris:
  provider: skyfield_bsp
  quality_tier: jpl_de_bsp
  kernels:
  - id: de440s
    path: configs/ephemerides/de440s.bsp
    checksum: sha256:c1c7feeab882263fc493a9d5a5b2ddd71b54826cdf65d8d17a76126b260a49f2
    targets:
    - earth
    - luna
    frame: gcrs
    coverage_start: 1850-01-01T00:00:00Z
    coverage_end: 2150-01-01T00:00:00Z
orbit:
  propagator: j2-mean-elements
dispatch:
  latency_authority: ome
  max_latency_age_ticks: 1
  substrate_compensation:
    measurement_source: node-agent-rtt
    rtt_to_one_way: half-rtt
routing:
  protocol: isis
  extensions:
  - traffic-engineering
  area_assignment:
    strategy: per-plane
time:
  step_seconds: 5
