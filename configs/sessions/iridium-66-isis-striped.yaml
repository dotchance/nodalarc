session:
  name: iridium-66-isis-striped

constellation: configs/constellations/iridium-66.yaml
ground_stations: configs/ground-stations/sets/polar-emphasis.yaml

routing:
  stack: configs/routing-stacks/frr-isis-sr
  area_assignment:
    strategy: stripe
    planes_per_stripe: 2
    gs_area_id: "49.0000"

time:
  mode: discrete-event
  step_seconds: 1

traffic_flows:
  - flow_id: svalbard-to-mcmurdo
    src: gs-svalbard
    dst: gs-mcmurdo
    protocol: udp
    bandwidth_kbps: 100
    probe_type: continuous

convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
