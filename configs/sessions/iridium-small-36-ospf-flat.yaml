session:
  name: iridium-small-36-ospf-flat

constellation: configs/constellations/iridium-small-36.yaml
ground_stations: configs/ground-stations/sets/polar-emphasis.yaml

routing:
  stack: configs/routing-stacks/frr-ospf-plain
  area_assignment:
    strategy: flat
    gs_area_id: "0.0.0.0"

time:
  mode: discrete-event
  step_seconds: 1

traffic_flows:
  - flow_id: svalbard-to-mcmurdo
    src: gs-svalbard
    dst: gs-mcmurdo
    protocol: udp
    bandwidth_kbps: 100
    probe_type: continuous

convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
