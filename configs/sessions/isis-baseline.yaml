session:
  name: isis-baseline
  data_dir: /var/nodalarc/sessions

constellation: configs/constellations/starlink-mini.yaml
ground_stations: configs/ground-stations/global-default.yaml

routing:
  stack: configs/routing-stacks/frr-isis-sr
  area_assignment:
    strategy: stripe
    planes_per_stripe: 2
    gs_area_id: "49.0000"

time:
  mode: discrete-event
  step_seconds: 1
  latency_update_interval_seconds: 10

convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
