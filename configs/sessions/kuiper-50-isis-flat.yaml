session:
  name: kuiper-50-isis-flat

constellation: configs/constellations/kuiper-50.yaml
ground_stations: configs/ground-stations/sets/global.yaml

addressing:
  sat_id_template: "sat-P{plane:02d}S{slot:02d}"
  gs_id_template: "gs-{name}"

routing:
  stack: configs/routing-stacks/frr-isis-sr
  area_assignment:
    strategy: flat
    gs_area_id: "49.0001"

time:
  mode: discrete-event
  step_seconds: 1
  latency_update_interval_seconds: 10

traffic_flows:
  - flow_id: ashburn-to-frankfurt
    src: gs-ashburn
    dst: gs-frankfurt
    protocol: udp
    bandwidth_kbps: 100
    probe_type: continuous

convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
