# Protocol Shootout — multi-session workflow, not a single session.
#
# This is Scenario 7 from the PRD: deploy the same constellation
# with different routing stacks, run the same failure scenario
# against each, then compare the resulting session databases.
#
# To run the protocol shootout:
#   bash docs/workflows/protocol-comparison.sh
#
# That script deploys isis-baseline.yaml and ospf-comparison.yaml
# in sequence, runs isl-failure.yaml against each, and then uses
# na-compare to produce a side-by-side convergence report.
#
# Individual session configs:
#   - configs/sessions/isis-baseline.yaml
#   - configs/sessions/ospf-comparison.yaml
#   - (future) configs/sessions/sdn-centralized.yaml

session:
  name: protocol-shootout
  data_dir: /var/nodalarc/sessions

constellation: configs/constellations/starlink-mini.yaml
ground_stations: configs/ground-stations/global-default.yaml

routing:
  stack: configs/routing-stacks/frr-isis-sr
  area_assignment:
    strategy: stripe
    planes_per_stripe: 2
    gs_area_id: "49.0000"

time:
  mode: discrete-event
  step_seconds: 1
  latency_update_interval_seconds: 10

convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
