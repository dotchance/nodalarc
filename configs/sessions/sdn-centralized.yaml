# SDN Centralized session — placeholder for Phase 2.
#
# This session config will use an OVS/OpenFlow routing stack
# (not yet implemented). The controller computes forwarding tables
# centrally and pushes flow rules to each satellite node.
#
# When the ovs-openflow stack is added:
#   routing:
#     stack: configs/routing-stacks/ovs-openflow
#     area_assignment:
#       strategy: flat

session:
  name: sdn-centralized
  data_dir: /var/nodalarc/sessions

constellation: configs/constellations/starlink-mini.yaml
ground_stations: configs/ground-stations/global-default.yaml

routing:
  stack: configs/routing-stacks/frr-isis-sr  # placeholder until ovs-openflow exists
  area_assignment:
    strategy: flat

time:
  mode: discrete-event
  step_seconds: 1
  latency_update_interval_seconds: 10

convergence:
  stability_period_s: 2.0
  timeout_s: 30.0
