session:
  name: starlink-176-mbb-test
constellation: configs/constellations/starlink-176.yaml
ground_stations: configs/ground-stations/sets/mbb-test.yaml
simulation:
  schema_version: 2
  ground_link_model: terminal_physics
orbit:
  propagator: j2-mean-elements
scheduling:
  ground:
    selection_policy:
      name: highest-elevation
      params: {}
    handover_policy:
      name: hysteresis
      params:
        discount_factor: 1.15
        mask_fade_range_deg: 5.0
    handover_mode: mbb
    mbb_overlap_ticks: 3
    mbb_reserve: 1
dispatch:
  latency_authority: ome
  max_latency_age_ticks: 1
  substrate_compensation:
    measurement_source: node-agent-rtt
    rtt_to_one_way: half-rtt
routing:
  protocol: isis
  extensions:
    - traffic-engineering
  area_assignment:
    strategy: per-plane
  bfd: true
time:
  step_seconds: 1
