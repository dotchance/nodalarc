# Starlink Gen2 Scale Test — Shell 1 Full Geometry, Verified Data Only
#
# 1,584 satellites (72 planes × 22 sats) at 550 km, 53° inclination.
# 64 gateway ground stations — ALL with FCC filing-exact coordinates.
# No geocoded approximations. Every coordinate traceable to an IBFS record.
#
# Satellite: Starlink v2 Mini — 4 optical ISL terminals at 100 Gbps each.
# Ground: Ka-band, 8 antennas per Gen1 gateway (FCC SES-LIC filings).
#
# Data sources:
#   Constellation: FCC SAT-MOD-20200417-00037
#   Satellites: SpaceX disclosure + FCC filing
#   Ground stations: FCC IBFS SES-LIC/MOD/STA filings (see station-registry.csv)
#
# Cluster requirement: 4 nodes × 20 cores × 32GB RAM
# Pod count: ~1,648 (1,584 sats + 64 GS)

session:
  name: starlink-gen2-scale
constellation: configs/constellations/starlink-gen2-1584.yaml
ground_stations: configs/ground-stations/sets/starlink-gen2-verified.yaml
routing:
  protocol: isis
  extensions:
    - traffic-engineering
  area_assignment:
    strategy: per-plane
  mbb_dispatch: true
  mbb_overlap_ticks: 3
  bfd: true
  bfd_detect_multiplier: 3
  bfd_rx_interval: 300
  bfd_tx_interval: 300
  isis_hello_interval: 1
  isis_hello_multiplier: 3
  spf_init_delay: 50
  spf_short_delay: 200
  spf_long_delay: 1000
  spf_holddown: 2000
  spf_time_to_learn: 500
time:
  step_seconds: 1
placement:
  policy: planePerNode
