session:
  name: starlink-shell1-realistic
constellation: configs/constellations/starlink-shell1-220.yaml
ground_stations: configs/ground-stations/sets/shell1-realistic.yaml
simulation:
  schema_version: 2
  ground_link_model: terminal_physics
orbit:
  propagator: j2-mean-elements
scheduling:
  ground:
    selection_policy:
      name: highest-elevation
      params: {}
    handover_policy:
      name: hysteresis
      params:
        discount_factor: 1.15
        mask_fade_range_deg: 5.0
    handover_mode: bbm
    mbb_overlap_ticks: 0
    mbb_reserve: 0
dispatch:
  latency_authority: ome
  max_latency_age_ticks: 1
  substrate_compensation:
    measurement_source: node-agent-rtt
    rtt_to_one_way: half-rtt
routing:
  protocol: isis
  extensions:
    - traffic-engineering
  area_assignment:
    strategy: per-plane
  bfd: true
  bfd_detect_multiplier: 3
  bfd_rx_interval: 300
  bfd_tx_interval: 300
  isis_hello_interval: 1
  isis_hello_multiplier: 3
  spf_init_delay: 50
  spf_short_delay: 200
  spf_long_delay: 1000
  spf_holddown: 2000
  spf_time_to_learn: 500
time:
  step_seconds: 1
placement:
  policy: planePerNode
