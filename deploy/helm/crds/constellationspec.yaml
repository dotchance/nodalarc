apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: constellationspecs.nodalarc.io
  labels:
    nodalarc.io/managed-by: helm
spec:
  group: nodalarc.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - sessionYaml
              properties:
                sessionYaml:
                  type: string
                  description: Complete session YAML content. The Operator parses this directly.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Rendering
                    - Creating
                    - Wiring
                    - Ready
                    - Error
                    - Terminating
                message:
                  type: string
                sessionId:
                  type: string
                sessionName:
                  type: string
                sessionRunId:
                  type: string
                podCount:
                  type: integer
                readyPods:
                  type: integer
                wiredPods:
                  type: integer
                platformHash:
                  type: string
                runtimeHash:
                  type: string
                lastTransitionTime:
                  type: string
                observedGeneration:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: string
          jsonPath: .status.readyPods
        - name: Pods
          type: string
          jsonPath: .status.podCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: constellationspecs
    singular: constellationspec
    kind: ConstellationSpec
    shortNames:
      - cs
