{{/* Init container that waits for NATS JetStream streams to exist.
     Used by every consumer pod (Scheduler, VS-API, Node Agent).
     Ensures streams are created by the OME init container before
     any consumer starts subscribing. */}}
{{- define "nodalarc.nats-wait-init" }}
- name: wait-nats-streams
  image: {{ required "images.natsBox is required" .Values.images.natsBox | quote }}
  imagePullPolicy: {{ .Values.imagePullPolicy }}
  command: ["sh", "-c"]
  args:
    - |
      echo "Waiting for NATS streams..."
{{- if .Values.nats.auth.enabled }}
      NATS_URL="nats://{{ .Values.nats.auth.users.admin.username }}:{{ .Values.nats.auth.users.admin.password }}@nodalarc-nats:4222"
{{- else }}
      NATS_URL="nats://nodalarc-nats:4222"
{{- end }}
      DEADLINE=$(($(date +%s) + 30))
      until nats stream info NODALARC_OME --server="$NATS_URL" 2>/dev/null && \
            nats stream info NODALARC_LINKS --server="$NATS_URL" 2>/dev/null && \
            nats stream info NODALARC_SESSION --server="$NATS_URL" 2>/dev/null && \
            nats stream info NODALARC_DEBUG --server="$NATS_URL" 2>/dev/null; do
        if [ "$(date +%s)" -ge "$DEADLINE" ]; then
          echo "FATAL: NATS streams not found after 30s. Aborting."
          exit 1
        fi
        sleep 2
      done
      echo "NATS streams ready."
{{- end }}
