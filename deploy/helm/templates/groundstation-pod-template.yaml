{{- range .Values.groundStations }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ .nodeId | lower }}
  namespace: {{ $.Values.namespace }}
  labels:
    nodalarc.io/node-id: {{ .nodeId }}
    nodalarc.io/role: ground_station
    nodalarc.io/gs-name: {{ .gsName }}
spec:
  containers:
    - name: frr
      image: {{ $.Values.images.frr }}
      imagePullPolicy: {{ $.Values.imagePullPolicy }}
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
      resources:
        limits:
          memory: {{ $.Values.groundStation.memoryLimit }}
          cpu: {{ $.Values.groundStation.cpuLimit }}
    - name: probe
      image: {{ $.Values.images.probe }}
      imagePullPolicy: {{ $.Values.imagePullPolicy }}
      securityContext:
        capabilities:
          add:
            - NET_RAW
      ports:
        - containerPort: 9100
          name: probe-api
      resources:
        limits:
          memory: 64Mi
          cpu: 100m
{{- if $.Values.sidecar }}
    - name: {{ $.Values.sidecar.image | replace ":" "-" | lower }}
      image: {{ $.Values.sidecar.image }}
      imagePullPolicy: {{ $.Values.imagePullPolicy }}
      securityContext:
        capabilities:
          add:
{{- range $.Values.sidecar.capabilities }}
            - {{ . }}
{{- end }}
{{- if .env }}
      env:
{{- range .env }}
        - name: {{ .name }}
          value: "{{ .value }}"
{{- end }}
{{- end }}
      resources:
        limits:
          memory: {{ $.Values.groundStation.memoryLimit }}
          cpu: {{ $.Values.groundStation.cpuLimit }}
{{- end }}
  restartPolicy: Never
{{- end }}
