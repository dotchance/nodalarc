{{- if and .Values.hostZmq.enabled (not .Values.scheduler.enabled) }}
# Headless service pointing to the host for ZMQ endpoints.
# Used by containerized components (e.g. NodalPath) to reach
# host-running orchestrator via K8s DNS.
# NOTE: OME has its own Service (nodalarc-ome) — port 5560 is NOT here.
# NOTE: When scheduler.enabled=true, nodalarc-scheduler Service provides
# these ports instead — this headless service is not created.
apiVersion: v1
kind: Service
metadata:
  name: nodalarc-host-zmq
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-host-zmq
spec:
  clusterIP: None
  ports:
    - name: to-events
      port: 5561
      protocol: TCP
    - name: playback-control
      port: 5566
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: nodalarc-host-zmq
  namespace: {{ .Values.namespace }}
subsets:
  - addresses:
      - ip: {{ .Values.hostZmq.hostIP | quote }}
    ports:
      - name: to-events
        port: 5561
        protocol: TCP
      - name: playback-control
        port: 5566
        protocol: TCP
{{- end }}
