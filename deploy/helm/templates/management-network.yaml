apiVersion: v1
kind: ServiceAccount
metadata:
  name: nodalarc-orchestrator
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nodalarc-orchestrator
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    # Scheduler gates startup on substrate status ConfigMaps selected by label.
    verbs: ["get", "list", "create", "update", "patch"]
  # Secrets — read SSH private key for terminal proxy (nodalarc-terminal-keys)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["nodalarc.io"]
    resources: ["constellationspecs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["nodalarc.io"]
    resources: ["constellationspecs/status"]
    verbs: ["get"]
  # Note: nodes is cluster-scoped — see ClusterRole below
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nodalarc-orchestrator
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nodalarc-orchestrator
subjects:
  - kind: ServiceAccount
    name: nodalarc-orchestrator
    namespace: {{ .Values.namespace }}
---
# ClusterRole for cluster-scoped resources (nodes)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nodalarc-orchestrator-cluster
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    nodalarc.io/managed-by: helm
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nodalarc-orchestrator-cluster
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    nodalarc.io/managed-by: helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nodalarc-orchestrator-cluster
subjects:
  - kind: ServiceAccount
    name: nodalarc-orchestrator
    namespace: {{ .Values.namespace }}
