apiVersion: v1
kind: ServiceAccount
metadata:
  name: nodalarc-orchestrator
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nodalarc-orchestrator
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
  # Note: nodes is cluster-scoped — see ClusterRole below
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nodalarc-orchestrator
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nodalarc-orchestrator
subjects:
  - kind: ServiceAccount
    name: nodalarc-orchestrator
    namespace: {{ .Values.namespace }}
---
# ClusterRole for cluster-scoped resources (nodes)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nodalarc-orchestrator-cluster
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nodalarc-orchestrator-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nodalarc-orchestrator-cluster
subjects:
  - kind: ServiceAccount
    name: nodalarc-orchestrator
    namespace: {{ .Values.namespace }}
