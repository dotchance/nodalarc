# NATS server with JetStream — file-based persistent storage.
# Streams survive pod restarts via PVC. Config via ConfigMap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodalarc-nats
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-nats
spec:
  replicas: {{ .Values.nats.replicas | default 1 }}
  selector:
    matchLabels:
      app: nodalarc-nats
  template:
    metadata:
      labels:
        app: nodalarc-nats
    spec:
{{- if .Values.controlPlaneNode }}
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.controlPlaneNode }}
{{- end }}
      containers:
        - name: nats
          image: {{ .Values.nats.image | default "nats:2.11-alpine" }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - "--config"
            - "/etc/nats/nats.conf"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          resources:
            limits:
              memory: {{ .Values.nats.memoryLimit | default "256Mi" }}
              cpu: {{ .Values.nats.cpuLimit | default "500m" }}
            requests:
              memory: {{ .Values.nats.memoryRequest | default "128Mi" }}
              cpu: {{ .Values.nats.cpuRequest | default "100m" }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: nodalarc-nats-config
        - name: data
          persistentVolumeClaim:
            claimName: nodalarc-nats-data
