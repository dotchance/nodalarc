{{- if .Values.nats.networkPolicy.enabled | default true }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nodalarc-nats-ingress
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-nats
spec:
  podSelector:
    matchLabels:
      app: nodalarc-nats
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - nodalarc-ome
                  - nodalarc-scheduler
                  - nodalarc-node-agent
                  - nodalarc-vs-api
                  - nodalarc-operator
{{- range .Values.nats.networkPolicy.hostNetworkCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 4222
{{- end }}
