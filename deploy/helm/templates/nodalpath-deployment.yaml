apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodalpath
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-nodalpath
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodalarc-nodalpath
  template:
    metadata:
      labels:
        app: nodalarc-nodalpath
    spec:
      serviceAccountName: nodalarc-orchestrator
{{- if .Values.controlPlaneNode }}
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.controlPlaneNode }}
{{- end }}
      containers:
        - name: nodalpath
          image: {{ .Values.images.nodalpath | default "nodalarc/nodalpath:latest" }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: NODAL_BUILD
              value: {{ .Values.buildTag | quote }}
          args:
            - "--session"
            - "/etc/nodalarc/session.yaml"
            - "--mode"
            - {{ .Values.nodalpath.mode | default "console" | quote }}
            - "--transport"
            - {{ .Values.nodalpath.transport | default "grpc" | quote }}
            - "--namespace"
            - {{ .Values.namespace }}
            - "--platform-config"
            - "/etc/nodalarc/platform.yaml"
            - "--nodalpath-config"
            - "/etc/nodalarc/nodalpath.yaml"
          ports:
            - containerPort: 3100
              name: console
              protocol: TCP
          env:
            - name: POD_IP_MAP_PATH
              value: /etc/nodalarc/pod-ips.json
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: {{ .Values.nodalpath.memoryLimit | default "512Mi" }}
              cpu: {{ .Values.nodalpath.cpuLimit | default "500m" }}
          volumeMounts:
            - name: session-config
              mountPath: /etc/nodalarc/session.yaml
              subPath: session.yaml
            - name: constellation-config
              mountPath: /etc/nodalarc/constellation.yaml
              subPath: constellation.yaml
            - name: ground-stations
              mountPath: /etc/nodalarc/ground-stations.yaml
              subPath: ground-stations.yaml
            - name: platform-config
              mountPath: /etc/nodalarc/platform.yaml
              subPath: platform.yaml
            - name: nodalpath-config
              mountPath: /etc/nodalarc/nodalpath.yaml
              subPath: nodalpath.yaml
            - name: pod-ips
              mountPath: /etc/nodalarc/pod-ips.json
              subPath: pod-ips.json
      volumes:
        - name: session-config
          configMap:
            name: nodalarc-session
            optional: true
        - name: constellation-config
          configMap:
            name: nodalarc-constellation
            optional: true
        - name: ground-stations
          configMap:
            name: nodalarc-ground-stations
            optional: true
        - name: platform-config
          configMap:
            name: nodalarc-platform-config
        - name: nodalpath-config
          configMap:
            name: nodalarc-nodalpath-config
        - name: pod-ips
          configMap:
            name: nodalarc-pod-ips
            optional: true
