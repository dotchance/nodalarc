apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nodalarc-node-agent
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-node-agent
spec:
  selector:
    matchLabels:
      app: nodalarc-node-agent
  template:
    metadata:
      labels:
        app: nodalarc-node-agent
        nodalarc.io/role: node-agent
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: nodalarc-node-agent
      nodeSelector:
        nodalarc.io/node-agent: "true"
      securityContext:
        seccompProfile:
          type: Unconfined
      tolerations:
        - operator: Exists
      initContainers:
        {{- include "nodalarc.nats-wait-init" (dict "Values" .Values "hostNetwork" true) | nindent 8 }}
      containers:
        - name: node-agent
          image: {{ required "images.nodeAgent is required" .Values.images.nodeAgent | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            privileged: true
          args:
            - "--platform-config"
            - "/etc/nodalarc/platform.yaml"
          env:
            - name: NODAL_BUILD
              value: {{ .Values.buildTag | quote }}
{{- if .Values.nats.hostNetworkHost }}
{{- if .Values.nats.auth.enabled }}
            - name: NODALARC_NATS_URL
              value: "nats://{{ .Values.nats.auth.users.nodeAgent.username }}:{{ .Values.nats.auth.users.nodeAgent.password }}@{{ .Values.nats.hostNetworkHost }}:{{ .Values.nats.clientPort }}"
{{- else }}
            - name: NODALARC_NATS_URL
              value: "nats://{{ .Values.nats.hostNetworkHost }}:{{ .Values.nats.clientPort }}"
{{- end }}
{{- else if .Values.nats.auth.enabled }}
            - name: NODALARC_NATS_URL
              value: "nats://{{ .Values.nats.auth.users.nodeAgent.username }}:{{ .Values.nats.auth.users.nodeAgent.password }}@nodalarc-nats:{{ .Values.nats.clientPort }}"
{{- end }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: CONTAINER_RUNTIME_ENDPOINT
              value: unix:///run/k3s/containerd/containerd.sock
            - name: NODE_AGENT_OPS_SPOOL
              value: /var/lib/nodalarc/node-agent/ops-events.jsonl
          resources:
            limits:
              memory: {{ .Values.nodeAgent.memoryLimit | default "256Mi" }}
              cpu: {{ .Values.nodeAgent.cpuLimit | default "500m" }}
          volumeMounts:
            - name: platform-config
              mountPath: /etc/nodalarc/platform.yaml
              subPath: platform.yaml
            - name: containerd-sock
              mountPath: /run/k3s/containerd/containerd.sock
              readOnly: true
            - name: node-agent-spool
              mountPath: /var/lib/nodalarc/node-agent
            - name: host-modules
              mountPath: /lib/modules
              readOnly: true
      volumes:
        - name: platform-config
          configMap:
            name: nodalarc-platform-config
        - name: containerd-sock
          hostPath:
            path: /run/k3s/containerd/containerd.sock
            type: Socket
        - name: node-agent-spool
          hostPath:
            path: /var/lib/nodalarc/node-agent
            type: DirectoryOrCreate
        - name: host-modules
          hostPath:
            path: /lib/modules
            type: Directory
