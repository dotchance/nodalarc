{{- if .Values.ome.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ome
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-ome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodalarc-ome
  template:
    metadata:
      labels:
        app: nodalarc-ome
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.controlPlaneNode | default "nodal" }}
      containers:
        - name: ome
          image: {{ .Values.images.ome }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - "--continuous"
            - "--platform-config"
            - "/etc/nodalarc/platform.yaml"
            - "/etc/nodalarc/session.yaml"
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 5560
              name: zmq-events
              protocol: TCP
            - containerPort: 5568
              name: zmq-catchup
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          resources:
            requests:
              cpu: {{ .Values.ome.cpuRequest | default "500m" }}
              memory: {{ .Values.ome.memoryRequest | default "512Mi" }}
            limits:
              cpu: {{ .Values.ome.cpuLimit | default "2000m" }}
              memory: {{ .Values.ome.memoryLimit | default "1Gi" }}
          volumeMounts:
            - name: session-config
              mountPath: /etc/nodalarc/session.yaml
              subPath: session.yaml
            - name: constellation-config
              mountPath: /etc/nodalarc/constellation.yaml
              subPath: constellation.yaml
            - name: ground-stations
              mountPath: /etc/nodalarc/ground-stations.yaml
              subPath: ground-stations.yaml
            - name: platform-config
              mountPath: /etc/nodalarc/platform.yaml
              subPath: platform.yaml
      volumes:
        - name: session-config
          configMap:
            name: nodalarc-session
            optional: true
        - name: platform-config
          configMap:
            name: nodalarc-platform-config
        - name: constellation-config
          configMap:
            name: nodalarc-constellation
            optional: true
        - name: ground-stations
          configMap:
            name: nodalarc-ground-stations
            optional: true
{{- end }}
