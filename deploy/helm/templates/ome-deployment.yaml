apiVersion: apps/v1
kind: Deployment
metadata:
  name: ome
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-ome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodalarc-ome
  template:
    metadata:
      labels:
        app: nodalarc-ome
    spec:
{{- if .Values.controlPlaneNode }}
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.controlPlaneNode }}
{{- end }}
      initContainers:
        - name: ensure-nats-streams
          image: {{ required "images.natsBox is required" .Values.images.natsBox | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for NATS..."
{{- if .Values.nats.auth.enabled }}
              NATS_URL="nats://{{ .Values.nats.auth.users.admin.username }}:{{ .Values.nats.auth.users.admin.password }}@nodalarc-nats:4222"
{{- else }}
              NATS_URL="nats://nodalarc-nats:4222"
{{- end }}
              until nats server check connection -s "$NATS_URL" 2>/dev/null; do
                sleep 1
              done
              echo "NATS ready. Creating streams..."
              nats stream add NODALARC_OME \
                --server="$NATS_URL" \
                --subjects="nodalarc.ome.>" \
                --storage=file --retention=limits \
                --max-msgs-per-subject=-1 \
                --max-age=3h12m \
                --max-bytes=134217728 \
                --defaults 2>/dev/null || true
              nats stream add NODALARC_LINKS \
                --server="$NATS_URL" \
                --subjects="nodalarc.links.>" \
                --storage=file --retention=limits \
                --max-msgs-per-subject=1 \
                --max-age=3h12m \
                --max-bytes=67108864 \
                --defaults 2>/dev/null || true
              nats stream add NODALARC_SESSION \
                --server="$NATS_URL" \
                --subjects="nodalarc.session.>" \
                --storage=file --retention=limits \
                --max-msgs-per-subject=1 \
                --max-age=3h12m \
                --max-bytes=67108864 \
                --defaults 2>/dev/null || true
              nats stream add NODALARC_OPS \
                --server="$NATS_URL" \
                --subjects="nodalarc.ops.>" \
                --storage=file --retention=limits \
                --max-msgs-per-subject=-1 \
                --max-age=4h \
                --max-bytes=134217728 \
                --defaults 2>/dev/null || true
              nats stream add NODALARC_DEBUG \
                --server="$NATS_URL" \
                --subjects="nodalarc.debug.>" \
                --storage=file --retention=limits \
                --max-msgs-per-subject=500 \
                --max-age=5m \
                --max-bytes=67108864 \
                --defaults 2>/dev/null || true
              echo "Streams ready."
      containers:
        - name: ome
          image: {{ required "images.ome is required" .Values.images.ome | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: NODAL_BUILD
              value: {{ .Values.buildTag | quote }}
{{- if .Values.nats.auth.enabled }}
            - name: NODALARC_NATS_URL
              value: "nats://{{ .Values.nats.auth.users.service.username }}:{{ .Values.nats.auth.users.service.password }}@nodalarc-nats:4222"
{{- end }}
          args:
            - "--continuous"
            - "--platform-config"
            - "/etc/nodalarc/platform.yaml"
            - "/etc/nodalarc/session.yaml"
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          resources:
            requests:
              cpu: {{ .Values.ome.cpuRequest | default "500m" }}
              memory: {{ .Values.ome.memoryRequest | default "512Mi" }}
            limits:
              cpu: {{ .Values.ome.cpuLimit | default "2000m" }}
              memory: {{ .Values.ome.memoryLimit | default "1Gi" }}
          volumeMounts:
            - name: session-config
              mountPath: /etc/nodalarc/session.yaml
              subPath: session.yaml
            - name: constellation-config
              mountPath: /etc/nodalarc/constellation.yaml
              subPath: constellation.yaml
            - name: ground-stations
              mountPath: /etc/nodalarc/ground-stations.yaml
              subPath: ground-stations.yaml
            - name: platform-config
              mountPath: /etc/nodalarc/platform.yaml
              subPath: platform.yaml
      volumes:
        - name: session-config
          configMap:
            name: nodalarc-session
            optional: true
        - name: platform-config
          configMap:
            name: nodalarc-platform-config
        - name: constellation-config
          configMap:
            name: nodalarc-constellation
            optional: true
        - name: ground-stations
          configMap:
            name: nodalarc-ground-stations
            optional: true
