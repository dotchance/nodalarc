apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodalarc-operator
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-operator
spec:
  replicas: 1
  strategy:
    # The Operator runs on the host network and binds its health port on the
    # control-plane node. A rolling surge can leave the replacement pod Pending
    # forever because the old pod still owns that host port. Recreate preserves
    # the single-authority operator contract and makes upgrades deterministic.
    type: Recreate
  selector:
    matchLabels:
      app: nodalarc-operator
  template:
    metadata:
      labels:
        app: nodalarc-operator
    spec:
      serviceAccountName: nodalarc-operator
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
{{- if .Values.controlPlaneNode }}
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.controlPlaneNode }}
{{- end }}
      containers:
        - name: operator
          image: {{ required "images.operator is required" .Values.images.operator | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: NODAL_BUILD
              value: {{ .Values.buildTag | quote }}
            # Fallback if no nodes have nodalarc.io/node-agent=true label.
            # The Operator discovers nodes automatically via the K8s API.
            - name: SESSION_NODE_NAME
              value: {{ .Values.sessionNodeName | quote }}
            - name: FRR_IMAGE
              value: {{ required "images.frr is required" .Values.images.frr | quote }}
            - name: PROBE_IMAGE
              value: {{ required "images.probe is required" .Values.images.probe | quote }}
            - name: NODALPATH_FWD_IMAGE
              value: {{ required "images.nodalpathFwd is required" .Values.images.nodalpathFwd | quote }}
            - name: IMAGE_PULL_POLICY
              value: {{ .Values.imagePullPolicy | quote }}
          ports:
            - containerPort: 8090
              name: health
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 4Gi
              cpu: "16"
          volumeMounts:
            - name: platform-config
              mountPath: /etc/nodalarc/platform.yaml
              subPath: platform.yaml
      volumes:
        - name: platform-config
          configMap:
            name: nodalarc-platform-config
