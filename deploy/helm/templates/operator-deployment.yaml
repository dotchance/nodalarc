apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodalarc-operator
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodalarc-operator
  template:
    metadata:
      labels:
        app: nodalarc-operator
    spec:
      serviceAccountName: nodalarc-operator
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
{{- if .Values.controlPlaneNode }}
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.controlPlaneNode }}
{{- end }}
      containers:
        - name: operator
          image: {{ .Values.images.operator | default "nodalarc/operator:latest" }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 8090
              name: health
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            # Fallback if no nodes have nodalarc.io/node-agent=true label.
            # The Operator discovers nodes automatically via the K8s API.
            - name: SESSION_NODE_NAME
              value: {{ .Values.sessionNodeName | quote }}
            - name: FRR_IMAGE
              value: {{ .Values.images.frr | default "nodalarc/frr:latest" | quote }}
          resources:
            limits:
              memory: 4Gi
              cpu: "16"
          volumeMounts:
            - name: platform-config
              mountPath: /etc/nodalarc/platform.yaml
              subPath: platform.yaml
      volumes:
        - name: platform-config
          configMap:
            name: nodalarc-platform-config
