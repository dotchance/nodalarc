apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodalarc-scheduler
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodalarc-scheduler
  template:
    metadata:
      labels:
        app: nodalarc-scheduler
      annotations:
        checksum/platform-config: {{ .Files.Get "files/platform.yaml" | sha256sum | quote }}
    spec:
      serviceAccountName: nodalarc-orchestrator
{{- if .Values.controlPlaneNode }}
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.controlPlaneNode }}
{{- end }}
      initContainers:
        {{- include "nodalarc.nats-wait-init" . | nindent 8 }}
      containers:
        - name: scheduler
          image: {{ required "images.scheduler is required" .Values.images.scheduler | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: NODAL_BUILD
              value: {{ .Values.buildTag | quote }}
{{- if .Values.nats.auth.enabled }}
            - name: NODALARC_NATS_URL
              value: "nats://{{ .Values.nats.auth.users.scheduler.username }}:{{ .Values.nats.auth.users.scheduler.password }}@nodalarc-nats:4222"
{{- end }}
          args:
            - "--session"
            - "/etc/nodalarc/session.yaml"
            - "--session-run-id-file"
            - "/etc/nodalarc/session_run_id"
            - "--platform-config"
            - "/etc/nodalarc/platform.yaml"
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: {{ .Values.scheduler.memoryLimit | default "512Mi" }}
              cpu: {{ .Values.scheduler.cpuLimit | default "500m" }}
          volumeMounts:
            - name: session-config
              mountPath: /etc/nodalarc/session.yaml
              subPath: session.yaml
            - name: session-config
              mountPath: /etc/nodalarc/session_run_id
              subPath: session_run_id
            - name: platform-config
              mountPath: /etc/nodalarc/platform.yaml
              subPath: platform.yaml
            - name: constellation-config
              mountPath: /etc/nodalarc/constellation.yaml
              subPath: constellation.yaml
            - name: ground-stations
              mountPath: /etc/nodalarc/ground-stations.yaml
              subPath: ground-stations.yaml
      volumes:
        - name: session-config
          configMap:
            name: nodalarc-session
            optional: true
        - name: platform-config
          configMap:
            name: nodalarc-platform-config
        - name: constellation-config
          configMap:
            name: nodalarc-constellation
            optional: true
        - name: ground-stations
          configMap:
            name: nodalarc-ground-stations
            optional: true
