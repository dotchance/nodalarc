# ClusterIP Service for Scheduler REQ/REP control ports.
# Single VIP — correct for REQ/REP sockets (one endpoint per request).
# Port 5564: scenario injection (na-scenario → Scheduler)
# Port 5566: playback control (VS-API → Scheduler)
apiVersion: v1
kind: Service
metadata:
  name: nodalarc-scheduler-control
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-scheduler
spec:
  selector:
    app: nodalarc-scheduler
  ports:
    - name: scenario-inject
      port: 5564
      targetPort: 5564
      protocol: TCP
    - name: playback-control
      port: 5566
      targetPort: 5566
      protocol: TCP
