# VS-API is platform infrastructure, not a session-scoped service.
#
# It is the user's front door — the browser wizard, WebSocket streaming,
# REST API, and session orchestrator. It must NEVER be restarted by the
# Operator during session switches (restart_platform_pods excludes it).
#
# Volume mount philosophy:
#   platform-config  — platform infrastructure config, does not change per session
#   session-config   — directory mount (auto-updates), bootstrap for dev path only;
#                      the wizard path reads session YAMLs from configs/sessions/
#   session-db       — emptyDir for SQLite (future: PVC-backed persistent storage
#                      for user-uploaded models, session history, and user catalog)
#
# Constellation, ground-station, satellite-type, and protocol definitions
# are baked into the image as the static product catalog (configs/).
# User-uploaded models will be stored on persistent volumes in a future
# release, alongside the static catalog. VS-API reads both when presenting
# the wizard — no ConfigMap mounts needed for session data.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodalarc-vs-api
  namespace: {{ .Values.namespace }}
  labels:
    app: nodalarc-vs-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nodalarc-vs-api
  template:
    metadata:
      labels:
        app: nodalarc-vs-api
    spec:
      serviceAccountName: nodalarc-orchestrator
{{- if .Values.controlPlaneNode }}
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.controlPlaneNode }}
{{- end }}
      initContainers:
        {{- include "nodalarc.nats-wait-init" . | nindent 8 }}
      containers:
        - name: vs-api
          image: {{ required "images.vsApi is required" .Values.images.vsApi | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - "--session"
            - "/etc/nodalarc/session-config/session.yaml"
            - "--db"
            - "/var/nodalarc/sessions/session.db"
            - "--port"
            - "8080"
            - "--platform-config"
            - "/etc/nodalarc/platform.yaml"
          ports:
            - containerPort: 8080
              hostPort: 8080    # VF dev server on host needs localhost:8080
              name: http
          env:
            - name: NODAL_BUILD
              value: {{ .Values.buildTag | quote }}
{{- if .Values.nats.auth.enabled }}
            - name: NODALARC_NATS_URL
              value: "nats://{{ .Values.nats.auth.users.service.username }}:{{ .Values.nats.auth.users.service.password }}@nodalarc-nats:4222"
{{- end }}
            - name: NODAL_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: nodalarc-session-state
                  key: api_key
                  optional: true
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: {{ .Values.vsApi.memoryLimit | default "512Mi" }}
              cpu: {{ .Values.vsApi.cpuLimit | default "500m" }}
          volumeMounts:
            - name: platform-config
              mountPath: /etc/nodalarc/platform.yaml
              subPath: platform.yaml
            - name: session-config
              mountPath: /etc/nodalarc/session-config
            - name: session-db
              mountPath: /var/nodalarc/sessions
      volumes:
        - name: platform-config
          configMap:
            name: nodalarc-platform-config
        - name: session-config
          configMap:
            name: nodalarc-session
            optional: true
        - name: session-db
          emptyDir: {}
