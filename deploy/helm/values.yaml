# Default values for Nodal Arc deployment
namespace: nodalarc

images:
  frr: docker.io/nodalarc/frr:10
  probe: docker.io/nodalarc/probe:1
  orchestrator: docker.io/nodalarc/orchestrator:latest
  ome: docker.io/nodalarc/ome:latest
  visualization: docker.io/nodalarc/visualization:1
  vf: docker.io/nodalarc/vf:latest
  nodalpath: docker.io/nodalarc/nodalpath:latest
  scheduler: docker.io/nodalarc/scheduler:latest
  nodeAgent: docker.io/nodalarc/node-agent:latest
  vsApi: docker.io/nodalarc/vs-api:latest

imagePullPolicy: Never  # Local images loaded into K3s containerd directly

satellite:
  memoryLimit: 128Mi
  cpuLimit: 100m

groundStation:
  memoryLimit: 128Mi
  cpuLimit: 100m

orchestrator:
  memoryLimit: 512Mi
  cpuLimit: 500m

ome:
  enabled: false
  cpuRequest: 500m
  cpuLimit: "2000m"
  memoryRequest: 512Mi
  memoryLimit: 1Gi

visualization:
  memoryLimit: 128Mi
  cpuLimit: 100m

# VF: containerized React SPA served by nginx
vf:
  memoryLimit: 128Mi
  cpuLimit: 100m
  vsApiHost: ""  # Set to host IP (e.g., 192.168.10.202) for external access

nodalpath:
  enabled: false
  mode: console
  transport: grpc
  memoryLimit: 256Mi
  cpuLimit: 500m

# M4: Scheduler replaces the host-side orchestrator.
# Consumes OME events and dispatches topology changes to Node Agents via gRPC.
scheduler:
  memoryLimit: 512Mi
  cpuLimit: 500m

# M4: Node Agent DaemonSet runs on each K3s node.
# Executes privileged netlink operations on behalf of the Scheduler.
nodeAgent:
  grpcPort: 50100
  memoryLimit: 256Mi
  cpuLimit: 500m

# VS-API: FastAPI server for visualization state
vsApi:
  memoryLimit: 512Mi
  cpuLimit: 500m

# Optional sidecar container (e.g. nodalpath-fwd gRPC daemon)
# Set by na-deploy when the routing stack specifies a non-FRR image.
sidecar: null

# Populated by na-deploy from constellation expansion
satellites: []
groundStations: []

# Session config (mounted as ConfigMap)
sessionConfig: ""
timelineFile: ""
mode: de
