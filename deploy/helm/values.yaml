# Default values for Nodal Arc deployment
namespace: nodalarc

images:
  frr: nodalarc/frr:latest
  ome: nodalarc/ome:latest
  vf: nodalarc/vf:latest
  nodalpath: nodalarc/nodalpath:latest
  scheduler: nodalarc/scheduler:latest
  nodeAgent: nodalarc/node-agent:latest
  vsApi: nodalarc/vs-api:latest
  operator: nodalarc/operator:latest

imagePullPolicy: Never  # Single-node: images loaded directly into containerd

ome:
  cpuRequest: 500m
  cpuLimit: "2000m"
  memoryRequest: 2Gi
  memoryLimit: 8Gi

# VF: containerized React SPA served by nginx
vf:
  memoryLimit: 128Mi
  cpuLimit: 100m
  vsApiHost: ""  # Set to host IP (e.g., 192.168.10.202) for external access

nodalpath:
  mode: console
  transport: grpc
  memoryLimit: 256Mi
  cpuLimit: 500m

# M4: Scheduler consumes OME events and dispatches topology changes to Node Agents.
scheduler:
  memoryLimit: 512Mi
  cpuLimit: 500m

# M4: Node Agent DaemonSet runs on each K3s node.
# Executes privileged netlink operations on behalf of the Scheduler.
nodeAgent:
  grpcPort: 50100
  memoryLimit: 256Mi
  cpuLimit: 500m

# VS-API: FastAPI server for visualization state
vsApi:
  memoryLimit: 512Mi
  cpuLimit: 500m

# NATS JetStream messaging server (M9: replaces all ZMQ)
nats:
  image: "nats:2.11-alpine"
  replicas: 1
  memoryLimit: 256Mi
  memoryRequest: 128Mi
  cpuLimit: 500m
  cpuRequest: 100m
  # Storage — local-path for single-node, switch to Longhorn/Rook for multi-node
  storageClass: "local-path"
  storageSize: "2Gi"

# Node where session pods (satellites, ground stations) are created.
# All session pods must land on the same node until M9 (CROSS_NODE ISL).
sessionNodeName: "nodal"

# K8s node hostname for platform pods.
controlPlaneNode: "nodal"
