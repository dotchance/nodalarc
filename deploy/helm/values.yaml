# Default values for Nodal Arc deployment
namespace: nodalarc

images:
  frr: docker.io/nodalarc/frr:10
  ome: docker.io/nodalarc/ome:latest
  vf: docker.io/nodalarc/vf:latest
  nodalpath: docker.io/nodalarc/nodalpath:latest
  scheduler: docker.io/nodalarc/scheduler:latest
  nodeAgent: docker.io/nodalarc/node-agent:latest
  vsApi: docker.io/nodalarc/vs-api:latest
  operator: docker.io/nodalarc/operator:latest

imagePullPolicy: Never  # Local images loaded into K3s containerd directly

ome:
  cpuRequest: 500m
  cpuLimit: "2000m"
  memoryRequest: 2Gi
  memoryLimit: 8Gi

# VF: containerized React SPA served by nginx
vf:
  memoryLimit: 128Mi
  cpuLimit: 100m
  vsApiHost: ""  # Set to host IP (e.g., 192.168.10.202) for external access

nodalpath:
  mode: console
  transport: grpc
  memoryLimit: 256Mi
  cpuLimit: 500m

# M4: Scheduler consumes OME events and dispatches topology changes to Node Agents.
scheduler:
  memoryLimit: 512Mi
  cpuLimit: 500m

# M4: Node Agent DaemonSet runs on each K3s node.
# Executes privileged netlink operations on behalf of the Scheduler.
nodeAgent:
  grpcPort: 50100
  memoryLimit: 256Mi
  cpuLimit: 500m

# VS-API: FastAPI server for visualization state
vsApi:
  memoryLimit: 512Mi
  cpuLimit: 500m

# Node where session pods (satellites, ground stations) are created.
# All session pods must land on the same node until M9 (CROSS_NODE ISL).
sessionNodeName: "nodal"

# K8s node hostname for platform pods.
controlPlaneNode: "nodal"
