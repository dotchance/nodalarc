# Default values for Nodal Arc deployment
namespace: nodalarc

images:
  frr: docker.io/nodalarc/frr:10
  probe: docker.io/nodalarc/probe:1
  orchestrator: docker.io/nodalarc/orchestrator:latest
  ome: docker.io/nodalarc/ome:latest
  visualization: docker.io/nodalarc/visualization:1
  nodalpath: docker.io/nodalarc/nodalpath:latest
  scheduler: docker.io/nodalarc/scheduler:latest
  nodeAgent: docker.io/nodalarc/node-agent:latest

imagePullPolicy: IfNotPresent  # Use Never for purely local registry

satellite:
  memoryLimit: 128Mi
  cpuLimit: 100m

groundStation:
  memoryLimit: 128Mi
  cpuLimit: 100m

orchestrator:
  memoryLimit: 512Mi
  cpuLimit: 500m

ome:
  enabled: false
  cpuRequest: 500m
  cpuLimit: "2000m"
  memoryRequest: 512Mi
  memoryLimit: 1Gi

visualization:
  memoryLimit: 128Mi
  cpuLimit: 100m

nodalpath:
  enabled: false
  mode: console
  transport: grpc
  memoryLimit: 256Mi
  cpuLimit: 500m

# M4: Scheduler replaces the host-side orchestrator.
# When enabled, the Scheduler consumes OME events and dispatches
# topology changes to Node Agents via gRPC.
scheduler:
  enabled: false
  memoryLimit: 512Mi
  cpuLimit: 500m
  groundStationsConfigMap: false  # Set true if ground-stations ConfigMap exists

# M4: Node Agent DaemonSet runs on each K3s node.
# Executes privileged netlink operations on behalf of the Scheduler.
nodeAgent:
  enabled: false
  grpcPort: 50100
  memoryLimit: 256Mi
  cpuLimit: 500m

# Host ZMQ service — points containerized components to host-running ZMQ publishers
hostZmq:
  enabled: false
  hostIP: ""  # Set to the host's IP reachable from pods (e.g. node internal IP)

# Optional sidecar container (e.g. nodalpath-fwd gRPC daemon)
# Set by na-deploy when the routing stack specifies a non-FRR image.
sidecar: null

# Populated by na-deploy from constellation expansion
satellites: []
groundStations: []

# Session config (mounted as ConfigMap)
sessionConfig: ""
timelineFile: ""
mode: de
