# Default values for Nodal Arc deployment
namespace: nodalarc

images:
  frr: nodalarc/frr:dev
  probe: nodalarc/probe:dev
  nodalpathFwd: nodalarc/nodalpath-fwd:dev
  ome: nodalarc/ome:dev
  vf: nodalarc/vf:dev
  scheduler: nodalarc/scheduler:dev
  nodeAgent: nodalarc/node-agent:dev
  vsApi: nodalarc/vs-api:dev
  operator: nodalarc/operator:dev
  nats: nats:2.11-alpine@sha256:e4bf19f15fd3218814a4e3c9e0064e1334bd8aa20d5984b9f1a0afd084f8cc00
  natsBox: natsio/nats-box:0.19.3@sha256:fbdf67cb49333afc50e2003c6857845d1ed9cf822d2b886cc5658ebf3c754b07

buildTag: "dev"
imagePullPolicy: Never  # Single-node: images loaded directly into containerd

# Resource strategy: requests are minimum guaranteed, limits are burst ceiling.
# Requests must fit on the node; limits can exceed node capacity (burstable QoS).

ome:
  cpuRequest: 500m
  cpuLimit: "16"
  memoryRequest: 512Mi
  memoryLimit: 16Gi

# VF: containerized React SPA served by nginx
vf:
  memoryLimit: 1Gi
  cpuLimit: "4"
  vsApiHost: ""  # Set to host IP (e.g., 192.168.10.202) for external access

# Scheduler consumes OME events and dispatches topology changes to Node Agents.
scheduler:
  memoryLimit: 4Gi
  cpuLimit: "16"

# Node Agent DaemonSet runs on each K3s node.
# Executes privileged netlink operations on behalf of the Scheduler.
nodeAgent:
  memoryLimit: 4Gi
  cpuLimit: "8"

# VS-API: FastAPI server for visualization state
vsApi:
  memoryLimit: 2Gi
  cpuLimit: "8"

# NATS JetStream messaging server
nats:
  replicas: 1
  clientPort: 4222
  # Host-network Node Agent pods cannot rely on ClusterIP reachability from
  # every node. scripts/na-install-platform.sh sets this to the control-plane
  # node InternalIP and enables a matching NATS hostPort.
  hostNetworkHost: ""
  memoryLimit: 2Gi
  memoryRequest: 256Mi
  cpuLimit: "8"
  cpuRequest: 250m
  auth:
    enabled: false
    users:
      admin:
        username: nodalarc-admin
        password: nodalarc-admin-dev
      scheduler:
        username: nodalarc-scheduler
        password: nodalarc-scheduler-dev
      nodeAgent:
        username: nodalarc-node-agent
        password: nodalarc-node-agent-dev
      service:
        username: nodalarc-service
        password: nodalarc-service-dev
  networkPolicy:
    enabled: true
    # Node Agent pods run with hostNetwork; NetworkPolicy engines see their
    # NATS traffic as node-IP traffic. scripts/na-install-platform.sh populates
    # this with exact /32 or /128 node IP CIDRs at install/upgrade time.
    hostNetworkCIDRs: []
  # Storage — local-path for single-node, switch to Longhorn/Rook for multi-node
  storageClass: "local-path"
  storageSize: "4Gi"

# Node where session pods are created (auto-detected if empty, or set to your node name).
sessionNodeName: ""

# Node for platform pods (auto-detected if empty, or set to your node name).
controlPlaneNode: ""
