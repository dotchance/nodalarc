# Default values for Nodal Arc deployment
namespace: nodalarc

images:
  frr: nodalarc/frr:dev
  probe: nodalarc/probe:dev
  nodalpathFwd: nodalarc/nodalpath-fwd:dev
  ome: nodalarc/ome:dev
  vf: nodalarc/vf:dev
  nodalpath: nodalarc/nodalpath:dev
  scheduler: nodalarc/scheduler:dev
  nodeAgent: nodalarc/node-agent:dev
  vsApi: nodalarc/vs-api:dev
  operator: nodalarc/operator:dev
  nats: nats:2.11-alpine
  natsBox: natsio/nats-box:0.19.3

buildTag: "dev"
imagePullPolicy: Never  # Single-node: images loaded directly into containerd

# Resource strategy: requests are minimum guaranteed, limits are burst ceiling.
# Requests must fit on the node; limits can exceed node capacity (burstable QoS).

ome:
  cpuRequest: 500m
  cpuLimit: "16"
  memoryRequest: 512Mi
  memoryLimit: 16Gi

# VF: containerized React SPA served by nginx
vf:
  memoryLimit: 1Gi
  cpuLimit: "4"
  vsApiHost: ""  # Set to host IP (e.g., 192.168.10.202) for external access

nodalpath:
  mode: console
  transport: grpc
  memoryLimit: 2Gi
  cpuLimit: "8"

# Scheduler consumes OME events and dispatches topology changes to Node Agents.
scheduler:
  memoryLimit: 4Gi
  cpuLimit: "16"

# Node Agent DaemonSet runs on each K3s node.
# Executes privileged netlink operations on behalf of the Scheduler.
nodeAgent:
  grpcPort: 50100
  memoryLimit: 4Gi
  cpuLimit: "8"

# VS-API: FastAPI server for visualization state
vsApi:
  memoryLimit: 2Gi
  cpuLimit: "8"

# NATS JetStream messaging server
nats:
  replicas: 1
  memoryLimit: 2Gi
  memoryRequest: 256Mi
  cpuLimit: "8"
  cpuRequest: 250m
  # Storage — local-path for single-node, switch to Longhorn/Rook for multi-node
  storageClass: "local-path"
  storageSize: "4Gi"

# Node where session pods are created (auto-detected if empty, or set to your node name).
sessionNodeName: ""

# Node for platform pods (auto-detected if empty, or set to your node name).
controlPlaneNode: ""
