server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Required for SharedArrayBuffer — enables the SGP4 Web Worker to use
    # shared memory for satellite position propagation. Without these headers,
    # Chrome disables SharedArrayBuffer and all orbital propagation runs on
    # the main thread (blocking the render loop at scale).
    #
    # nginx's add_header in a location block replaces ALL inherited server-level
    # headers, so COOP/COEP must be repeated in every location that has its
    # own add_header directives.

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    # Static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    # config.js — no cache (written fresh at each container start)
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-store";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
