syntax = "proto3";

package nodalpath.forwarding;

// The service exposed by the custom MPLS container.
// NodalPath calls this to update forwarding tables.
service ForwardingService {
  // Push a complete forwarding table update to the node.
  // The node replaces its current forwarding state with the provided entries.
  rpc UpdateForwardingTable(ForwardingTableUpdate) returns (PushResponse);

  // Retrieve the node's current forwarding table.
  rpc GetForwardingTable(Empty) returns (ForwardingTableState);

  // Get the node's operational status.
  rpc GetStatus(Empty) returns (NodeStatus);
}

message Empty {}

message LabelEntry {
  uint32 in_label = 1;
  Action action = 2;
  uint32 out_label = 3;           // 0 if action is POP
  string out_interface = 4;
  uint32 backup_out_label = 5;    // 0 if no backup
  string backup_out_interface = 6; // empty if no backup
  string nexthop_ip = 7;          // peer loopback IP (legacy, unused in netlink path)
  string nexthop_ll = 8;          // peer IPv6 link-local (fe80::...) for MPLS via inet6
  string nexthop_mac = 9;         // peer MAC for PERMANENT neighbor entry
}

enum Action {
  SWAP = 0;
  POP = 1;
  PUSH = 2;
}

message IngressEntry {
  string dst_prefix = 1;          // e.g., "172.16.2.0/24"
  uint32 push_label = 2;          // first label (backward compat)
  string out_interface = 3;
  uint32 backup_push_label = 4;   // 0 if no backup
  string backup_out_interface = 5; // empty if no backup
  string nexthop_ip = 6;          // peer loopback IP (legacy, unused in netlink path)
  repeated uint32 label_stack = 7; // full SR-TE label stack [adj1, adj2, ..., node_egress]
  string nexthop_ll = 8;          // peer IPv6 link-local for LER encap via inet6
  string nexthop_mac = 9;         // peer MAC for PERMANENT neighbor entry
}

message ForwardingTableUpdate {
  string topology_state_id = 1;
  string sim_time = 2;
  repeated LabelEntry lsr_entries = 3;
  repeated IngressEntry ler_entries = 4;
}

message PushResponse {
  bool success = 1;
  string error_message = 2;       // empty on success
  uint32 entries_installed = 3;
  float apply_time_ms = 4;
}

message ForwardingTableState {
  string topology_state_id = 1;
  string sim_time = 2;
  repeated LabelEntry lsr_entries = 3;
  repeated IngressEntry ler_entries = 4;
}

message NodeStatus {
  string node_id = 1;
  string current_topology_state_id = 2;
  uint32 total_entries = 3;
  float last_update_ms = 4;
  string last_update_time = 5;    // ISO 8601
}
