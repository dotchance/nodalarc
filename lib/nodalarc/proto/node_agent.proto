syntax = "proto3";

package nodalarc.node_agent;

// The Node Agent runs as a DaemonSet on each K3s node. It executes
// privileged netlink operations against local pod namespaces. The Scheduler
// sends these protobuf payloads over NATS request/reply; this file intentionally
// declares messages only, not a gRPC service.

message CommandEnvelope {
  string operation_id = 1;
  string session_id = 2;
  string wiring_generation = 3;
  string operation_kind = 4;
}

enum NodeAgentErrorCode {
  NODE_AGENT_ERROR_UNSPECIFIED = 0;
  NODE_AGENT_OK = 1;
  NODE_AGENT_MALFORMED_FRAME = 2;
  NODE_AGENT_UNKNOWN_MESSAGE_TYPE = 3;
  NODE_AGENT_BAD_PROTOBUF = 4;
  NODE_AGENT_INVALID_ENVELOPE = 5;
  NODE_AGENT_STALE_SESSION = 6;
  NODE_AGENT_STALE_GENERATION = 7;
  NODE_AGENT_INVALID_FIELD = 8;
  NODE_AGENT_PID_NOT_FOUND = 9;
  NODE_AGENT_KERNEL_MUTATION_FAILED = 10;
  NODE_AGENT_KERNEL_PROOF_FAILED = 11;
  NODE_AGENT_CLEANUP_FAILED = 12;
  NODE_AGENT_HOST_IP_MISSING = 13;
  NODE_AGENT_DIRTY_KERNEL = 14;
  NODE_AGENT_INTERNAL_ERROR = 15;
  NODE_AGENT_UNAUTHORIZED = 16;
  NODE_AGENT_DEPENDENCY_MISSING = 17;
  NODE_AGENT_MANIFEST_INVALID = 18;
}

enum LinkType {
  LINK_TYPE_UNSPECIFIED = 0;
  LINK_TYPE_ISL = 1;
  LINK_TYPE_GROUND = 2;
}

// Per-interface locality — carried in each InterfaceUp/InterfaceDown entry,
// not on the batch request. The Node Agent decides per-interface whether to
// use local veth or VXLAN.
enum Locality {
  LOCALITY_UNSPECIFIED = 0;
  LOCALITY_LOCAL = 1;        // Both pods on this node — direct veth operations
  LOCALITY_CROSS_NODE = 2;   // Pods on different nodes — VXLAN tunnel
}

message CommandFailureResponse {
  bool success = 1;
  NodeAgentErrorCode error_code = 2;
  string error_message = 3;
  bool dirty_kernel = 4;
}

// --- BatchLinkDown ---

message InterfaceDown {
  string node_id = 1;
  string interface_name = 2;
  // field 3 reserved — PID looked up by Node Agent internally
  LinkType link_type = 4;
  string gs_id = 5;
  string sat_id = 6;
  // fields 7-8 reserved — PID looked up by Node Agent internally
  // CROSS_NODE VXLAN parameters (empty/zero for LOCAL)
  string remote_node_ip = 9;
  int32 vni = 10;
  // Per-interface locality
  Locality locality = 11;
  // Peer info for host-mediated ISL (host-side veth name computation)
  string peer_node_id = 12;
  string peer_interface_name = 13;
}

message BatchLinkDownRequest {
  CommandEnvelope envelope = 1;
  string target_sim_time = 2;
  // field 3 removed — locality moved to per-interface (M10)
  repeated InterfaceDown interfaces = 4;
}

message InterfaceResult {
  string node_id = 1;
  string interface_name = 2;
  bool success = 3;
  NodeAgentErrorCode error_code = 4;
  string error_message = 5;
  bool verified = 6;
  bool dirty_kernel = 7;
  string proof_summary = 8;
  repeated string proof_evidence = 9;
}

message BatchLinkDownResponse {
  bool success = 1;
  string error_message = 2;
  int32 interfaces_downed = 3;
  float apply_time_ms = 4;
  repeated InterfaceResult interface_results = 5;
  NodeAgentErrorCode error_code = 6;
  bool dirty_kernel = 7;
}

// --- BatchLinkUp ---

message InterfaceUp {
  string node_id = 1;
  string interface_name = 2;
  // field 3 reserved — PID looked up by Node Agent internally
  LinkType link_type = 4;
  double latency_ms = 5;
  double bandwidth_mbps = 6;
  string gs_id = 7;
  string sat_id = 8;
  // fields 9-10 reserved — PID looked up by Node Agent internally
  // field 11 reserved — peer_mac removed with v0.72 NDP deletion
  //   (Node Agent no longer performs L3 neighbor resolution; see §13.22.6)
  reserved 11;
  // CROSS_NODE VXLAN parameters (empty/zero for LOCAL)
  string remote_node_ip = 12;
  int32 vni = 13;
  // Per-interface locality
  Locality locality = 14;
  // Peer info for host-mediated ISL (host-side veth name computation)
  string peer_node_id = 15;
  string peer_interface_name = 16;
}

message BatchLinkUpRequest {
  CommandEnvelope envelope = 1;
  string target_sim_time = 2;
  // field 3 removed — locality moved to per-interface (M10)
  repeated InterfaceUp interfaces = 4;
}

message BatchLinkUpResponse {
  bool success = 1;
  string error_message = 2;
  int32 interfaces_upped = 3;
  float apply_time_ms = 4;
  repeated InterfaceResult interface_results = 5;
  NodeAgentErrorCode error_code = 6;
  bool dirty_kernel = 7;
}

// --- SetLatency ---

message LatencyEntry {
  string node_id = 1;
  string interface_name = 2;
  // field 3 reserved — PID looked up by Node Agent internally
  double latency_ms = 4;
  LinkType link_type = 5;
  string gs_id = 6;
  string sat_id = 7;
  // fields 8-9 reserved — PID looked up by Node Agent internally
}

message SetLatencyRequest {
  CommandEnvelope envelope = 1;
  repeated LatencyEntry entries = 2;
}

message LatencyResult {
  string node_id = 1;
  string interface_name = 2;
  bool success = 3;
  NodeAgentErrorCode error_code = 4;
  string error_message = 5;
  bool verified = 6;
  bool dirty_kernel = 7;
  string proof_summary = 8;
  repeated string proof_evidence = 9;
}

message SetLatencyResponse {
  bool success = 1;
  string error_message = 2;
  int32 entries_updated = 3;
  repeated LatencyResult entry_results = 4;
  NodeAgentErrorCode error_code = 5;
  bool dirty_kernel = 6;
}
