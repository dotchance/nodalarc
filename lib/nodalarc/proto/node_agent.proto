syntax = "proto3";

package nodalarc.node_agent;

// The Node Agent runs as a DaemonSet on each K3s node.
// It executes privileged netlink operations against local pod namespaces.
// The Scheduler sends batched commands; the agent executes them concurrently.
// PIDs are never supplied by the Scheduler — the Node Agent looks them up
// internally from its own pid_map (populated during wiring).
service NodeAgentService {
  // Bring down a batch of interfaces atomically.
  // All operations execute concurrently. ACK returned when all complete.
  rpc BatchLinkDown(BatchLinkDownRequest) returns (BatchLinkDownResponse);

  // Bring up a batch of interfaces with tc shaping and NDP resolution.
  // All operations execute concurrently. ACK returned when all complete.
  rpc BatchLinkUp(BatchLinkUpRequest) returns (BatchLinkUpResponse);

  // Update netem delay on active interfaces.
  rpc SetLatency(SetLatencyRequest) returns (SetLatencyResponse);

  // Return observed interface state for reconciliation.
  rpc GetTopology(GetTopologyRequest) returns (GetTopologyResponse);
}

enum LinkType {
  ISL = 0;
  GROUND = 1;
}

// Per-interface locality (PRD Decision 1, Section 13.6).
// Carried in each InterfaceUp/InterfaceDown entry — not on the batch request.
// The Node Agent decides per-interface whether to use local veth or VXLAN.
enum Locality {
  LOCAL = 0;        // Both pods on this node — direct veth operations
  CROSS_NODE = 1;   // Pods on different nodes — VXLAN tunnel
}

// --- BatchLinkDown ---

message InterfaceDown {
  string node_id = 1;
  string interface_name = 2;
  // field 3 reserved — PID looked up by Node Agent internally
  LinkType link_type = 4;
  string gs_id = 5;
  string sat_id = 6;
  // fields 7-8 reserved — PID looked up by Node Agent internally
  // CROSS_NODE VXLAN parameters (empty/zero for LOCAL)
  string remote_node_ip = 9;
  int32 vni = 10;
  // Per-interface locality (PRD Decision 1)
  Locality locality = 11;
}

message BatchLinkDownRequest {
  string batch_id = 1;
  string target_sim_time = 2;
  // field 3 removed — locality moved to per-interface (M10)
  repeated InterfaceDown interfaces = 4;
}

message BatchLinkDownResponse {
  bool success = 1;
  string error_message = 2;
  int32 interfaces_downed = 3;
  float apply_time_ms = 4;
}

// --- BatchLinkUp ---

message InterfaceUp {
  string node_id = 1;
  string interface_name = 2;
  // field 3 reserved — PID looked up by Node Agent internally
  LinkType link_type = 4;
  double latency_ms = 5;
  double bandwidth_mbps = 6;
  string gs_id = 7;
  string sat_id = 8;
  // fields 9-10 reserved — PID looked up by Node Agent internally
  // NDP: peer MAC for deriving link-local address (ISL only)
  string peer_mac = 11;
  // CROSS_NODE VXLAN parameters (empty/zero for LOCAL)
  string remote_node_ip = 12;
  int32 vni = 13;
  // Per-interface locality (PRD Decision 1)
  Locality locality = 14;
}

message BatchLinkUpRequest {
  string batch_id = 1;
  string target_sim_time = 2;
  // field 3 removed — locality moved to per-interface (M10)
  repeated InterfaceUp interfaces = 4;
}

message BatchLinkUpResponse {
  bool success = 1;
  string error_message = 2;
  int32 interfaces_upped = 3;
  float apply_time_ms = 4;
}

// --- SetLatency ---

message LatencyEntry {
  string node_id = 1;
  string interface_name = 2;
  // field 3 reserved — PID looked up by Node Agent internally
  double latency_ms = 4;
  LinkType link_type = 5;
  string gs_id = 6;
  string sat_id = 7;
  // fields 8-9 reserved — PID looked up by Node Agent internally
}

message SetLatencyRequest {
  repeated LatencyEntry entries = 1;
}

message SetLatencyResponse {
  bool success = 1;
  string error_message = 2;
  int32 entries_updated = 3;
}

// --- GetTopology ---

message GetTopologyRequest {}

message InterfaceState {
  string node_id = 1;
  string interface_name = 2;
  bool admin_up = 3;
  bool oper_up = 4;
  double current_latency_ms = 5;
}

message GetTopologyResponse {
  repeated InterfaceState interfaces = 1;
}
