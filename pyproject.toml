[dependency-groups]
runtime = [
    "pydantic>=2.13.4",
    "nats-py>=2.7.0",
    "pyyaml",
    "numpy",
    "sgp4",
    "skyfield",
    "jinja2",
    "fastapi",
    "uvicorn",
    "pyroute2",
    "kubernetes",
    "websockets>=16.0",
    "grpcio>=1.74",
    "protobuf>=6.31.1,<7",
    "httpx>=0.28.1",
    "asyncssh>=2.23.0",
]
dev = [
    { include-group = "runtime" },
    "grpcio-tools>=1.80.0",
    "pytest",
    "pytest-cov",
    "pytest-timeout>=2.4.0",
    "mypy",
    "ruff>=0.15.13",
    "pre-commit>=4.6.0",
    "vulture>=2.14",
    "kopf>=1.37",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["lib", "services"]
timeout = 30
markers = [
    "requires_root: tests that need root/namespace access",
    "integration: integration tests requiring K3s",
]

[tool.uv]
default-groups = ["runtime", "dev"]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4", "W"]
ignore = ["E501", "B008", "E402", "E741", "E701", "E702", "SIM115", "UP047"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "SIM"]
"**/tests/**" = ["B", "SIM"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
