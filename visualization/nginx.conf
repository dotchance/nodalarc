server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    # index.html must never be cached — it contains the content-hashed
    # asset filenames. Stale index.html = stale JS/CSS references.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # config.js — no cache (written fresh at each container start)
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
